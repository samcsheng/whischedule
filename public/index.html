<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sam's Schedule — Whistler Blackcomb</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Syne+Mono&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg:      #060d1a;
  --surface: #0c1829;
  --card:    #111f35;
  --border:  rgba(255,255,255,0.07);
  --snow:    #e8f0ff;
  --muted:   #4a6080;
  --dim:     #1e3050;
  --blue:    #3b8bff;
  --orange:  #ff7c42;
  --green:   #2dcc8a;
  --purple:  #9b7dff;
  --yellow:  #ffc542;
  --red:     #ff4d6d;
  --teal:    #2dccc4;
}
html, body { height: 100%; background: var(--bg); color: var(--snow); font-family: 'Inter', sans-serif; overflow-x: hidden; }
body::after { content:''; position:fixed; inset:0; pointer-events:none; z-index:9999; opacity:0.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:150px; }

/* TABS */
.tabs { display:flex; position:fixed; bottom:0; left:0; right:0; z-index:100;
  background:rgba(6,13,26,0.95); backdrop-filter:blur(20px);
  border-top:1px solid var(--border); padding-bottom:env(safe-area-inset-bottom,10px); }
.tab { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:12px 4px 8px;
  cursor:pointer; color:var(--muted); font-size:10px; font-weight:500; letter-spacing:0.05em;
  text-transform:uppercase; transition:color 0.2s; }
.tab svg { width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:1.8; }
.tab.active { color:var(--blue); }
.page { display:none; min-height:100vh; padding-bottom:90px; }
.page.active { display:block; }

/* SCHEDULE PAGE */
.sched-header { padding:52px 20px 20px;
  background:linear-gradient(180deg,rgba(59,139,255,0.08) 0%,transparent 100%);
  border-bottom:1px solid var(--border); }
.sched-header-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:0; }
.greeting { font-size:11px; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:4px; }
.sched-title { font-family:'Syne',sans-serif; font-size:30px; font-weight:800; line-height:1; }
.instructor-chip { display:flex; align-items:center; gap:8px;
  background:var(--card); border:1px solid var(--border); border-radius:30px; padding:6px 12px 6px 6px; }
.chip-avatar { width:28px; height:28px; border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  display:flex; align-items:center; justify-content:center;
  font-family:'Syne',sans-serif; font-size:12px; font-weight:700; }
.chip-name { font-size:11px; font-weight:500; white-space:nowrap; }

/* MONTH NAV */
.month-nav { display:flex; align-items:center; justify-content:space-between; padding:16px 20px 0; }
.month-label { font-family:'Syne',sans-serif; font-size:20px; font-weight:700; }
.nav-arrows { display:flex; gap:4px; }
.nav-btn { width:32px; height:32px; border-radius:8px; background:var(--card);
  border:1px solid var(--border); color:var(--snow); cursor:pointer;
  display:flex; align-items:center; justify-content:center; font-size:16px; transition:background 0.15s; }
.nav-btn:hover { background:var(--dim); }

/* WEEK STRIP */
.week-strip { display:flex; gap:6px; padding:14px 20px 0; overflow-x:auto; scrollbar-width:none; }
.week-strip::-webkit-scrollbar { display:none; }
.wd { flex-shrink:0; width:44px; display:flex; flex-direction:column; align-items:center;
  gap:5px; padding:8px 4px; border-radius:12px; cursor:pointer; transition:all 0.15s; }
.wd-label { font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }
.wd-num { font-family:'Syne',sans-serif; font-size:18px; font-weight:700; line-height:1; color:var(--snow); }
.wd-dot { width:5px; height:5px; border-radius:50%; background:transparent; }
.wd.has-work .wd-dot { background:var(--blue); }
.wd.is-off { opacity:0.3; }
.wd.selected { background:var(--blue); }
.wd.selected .wd-label,.wd.selected .wd-num { color:white; }
.wd.selected .wd-dot { background:rgba(255,255,255,0.6); }
.wd.today-ring .wd-num { color:var(--blue); }
.wd.past-day { opacity:0.6; }

/* DAY CARDS */
.day-detail { padding:16px 20px; }
.day-detail-header { font-family:'Syne',sans-serif; font-size:14px; font-weight:600;
  color:var(--muted); margin-bottom:12px; letter-spacing:0.05em; text-transform:uppercase; }
.no-lessons { text-align:center; padding:32px; color:var(--muted); font-size:14px; }

.day-summary-bar { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
.dsb-item { font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px; letter-spacing:0.03em; }

/* LESSON CARD */
.lcard { background:var(--card); border:1px solid var(--border); border-radius:16px;
  padding:14px 16px; margin-bottom:8px; position:relative; overflow:hidden; }
.lcard::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:3px 0 0 3px; }

/* type colours */
.lcard.type-schools::before  { background:var(--blue); }
.lcard.type-daily::before    { background:var(--teal); }
.lcard.type-club::before     { background:var(--purple); }
.lcard.type-alpine::before   { background:var(--green); }
.lcard.type-private::before  { background:var(--yellow); }
.lcard.type-training::before { background:var(--green); }
.lcard.type-off::before      { background:var(--dim); }
.lcard.type-sick::before     { background:var(--red); }
.lcard.type-other::before    { background:var(--muted); }

.lcard.is-off   { opacity:0.35; }

.lcard-top { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
.lcard-left { flex:1; }
.lcard-activity { font-size:14px; font-weight:600; color:var(--snow); line-height:1.3; }
.lcard-sub { font-size:11px; color:var(--muted); margin-top:3px; }
.lcard-hours { font-family:'Syne Mono',monospace; font-size:22px; color:var(--blue); flex-shrink:0; line-height:1; text-align:right; }
.lcard-hours small { font-family:'Inter',sans-serif; font-size:9px; color:var(--muted); display:block; }
.lcard.type-private .lcard-hours { color:var(--yellow); }
.lcard.type-daily   .lcard-hours { color:var(--teal); }
.lcard.type-club    .lcard-hours { color:var(--purple); }

.lcard-meta { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
.pill { font-size:10px; font-weight:500; padding:3px 9px; border-radius:20px; letter-spacing:0.02em; }
.pill-assigned   { background:rgba(59,139,255,0.15); color:var(--blue);   border:1px solid rgba(59,139,255,0.25); }
.pill-continuing { background:rgba(155,125,255,0.15); color:var(--purple); border:1px solid rgba(155,125,255,0.25); }
.pill-sched      { background:rgba(74,96,128,0.2);   color:var(--muted);  border:1px solid rgba(74,96,128,0.2); }
.pill-client     { background:rgba(255,197,66,0.12); color:var(--yellow); border:1px solid rgba(255,197,66,0.25); }
.pill-loc        { background:rgba(255,255,255,0.05); color:var(--muted);  border:1px solid var(--border); }
.pill-ski        { background:rgba(59,139,255,0.08); color:#7ab8ff;       border:1px solid rgba(59,139,255,0.15); }
.pill-sb         { background:rgba(255,124,66,0.08); color:#ffaa7a;       border:1px solid rgba(255,124,66,0.15); }
.pill-fd         { background:rgba(255,197,66,0.1); color:var(--yellow);  border:1px solid rgba(255,197,66,0.2); }
.pill-hd         { background:rgba(255,197,66,0.06); color:#c9a030;       border:1px solid rgba(255,197,66,0.12); }
.pill-sick       { background:rgba(255,77,109,0.12); color:var(--red);    border:1px solid rgba(255,77,109,0.2); }
.pill-off        { background:rgba(255,255,255,0.04); color:var(--muted); border:1px solid var(--border); }

/* STATS PAGE */
.stats-page { padding:52px 20px 24px; }
.stats-title { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; margin-bottom:4px; }
.stats-sub { font-size:12px; color:var(--muted); margin-bottom:24px; }
.section-title { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; margin:20px 0 10px; }

.big-stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:4px; }
.bstat { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px 16px; }
.bstat-val { font-family:'Syne',sans-serif; font-size:36px; font-weight:800; line-height:1; }
.bstat-val.c-blue   { color:var(--blue); }
.bstat-val.c-orange { color:var(--orange); }
.bstat-val.c-green  { color:var(--green); }
.bstat-val.c-yellow { color:var(--yellow); }
.bstat-val.c-purple { color:var(--purple); }
.bstat-val.c-teal   { color:var(--teal); }
.bstat-label { font-size:10px; color:var(--muted); margin-top:5px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; }

.breakdown { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:16px; }
.brow { margin-bottom:14px; }
.brow:last-child { margin-bottom:0; }
.brow-top { display:flex; justify-content:space-between; margin-bottom:6px; align-items:center; }
.brow-label { font-size:12px; font-weight:500; display:flex; align-items:center; gap:6px; }
.brow-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.brow-vals { font-family:'Syne Mono',monospace; font-size:11px; color:var(--muted); }
.brow-bar { height:4px; background:rgba(255,255,255,0.06); border-radius:2px; overflow:hidden; }
.brow-fill { height:100%; border-radius:2px; transition:width 1.2s cubic-bezier(0.16,1,0.3,1); }

.heatmap-wrap { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:16px; overflow-x:auto; }
.heatmap-months { display:flex; gap:14px; min-width:max-content; }
.hm-month-label { font-size:10px; color:var(--muted); font-weight:600; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:6px; }
.hm-grid { display:grid; grid-template-columns:repeat(7,16px); gap:3px; }
.hm-cell { width:16px; height:16px; border-radius:3px; }
.hm-empty    { background:transparent; }
.hm-off      { background:rgba(255,255,255,0.05); }
.hm-light    { background:rgba(59,139,255,0.3); }
.hm-med      { background:rgba(59,139,255,0.6); }
.hm-full     { background:var(--blue); }
.hm-private  { background:var(--yellow); opacity:0.85; }
.hm-training { background:var(--green); opacity:0.7; }
.hm-sick     { background:var(--red); opacity:0.8; }
.hm-sched    { background: repeating-linear-gradient(45deg, rgba(59,139,255,0.5) 0px, rgba(59,139,255,0.5) 3px, rgba(59,139,255,0.15) 3px, rgba(59,139,255,0.15) 6px); }
.hm-end      { background:rgba(255,77,109,0.5); border:1px solid rgba(255,77,109,0.7); }
.hm-legend { display:flex; flex-wrap:wrap; gap:10px; margin-top:10px; padding:12px 16px; background:var(--card); border:1px solid var(--border); border-radius:16px; }
.hm-leg-item { display:flex; align-items:center; gap:5px; font-size:10px; color:var(--muted); font-weight:500; }
.hm-leg-swatch { width:12px; height:12px; border-radius:2px; flex-shrink:0; }

.client-list { background:var(--card); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
.client-row { display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px solid var(--border); }
.client-row:last-child { border-bottom:none; }
.client-avatar { width:30px; height:30px; border-radius:50%; background:linear-gradient(135deg,rgba(255,197,66,0.3),rgba(255,124,66,0.3)); border:1px solid rgba(255,197,66,0.2); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--yellow); flex-shrink:0; }
.client-name { font-size:13px; font-weight:600; flex:1; }
.client-meta { font-size:10px; color:var(--muted); }
.client-days { font-family:'Syne Mono',monospace; font-size:13px; color:var(--yellow); }

.fade-in { animation:fi 0.4s ease both; }
@keyframes fi { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}.d5{animation-delay:.25s}

/* ── FLOATING REFRESH BUTTON ── */
.fab-refresh {
  position: fixed; bottom: 90px; right: 20px; z-index: 200;
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--blue); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(59,139,255,0.4);
  transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
  color: white;
}
.fab-refresh:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(59,139,255,0.55); }
.fab-refresh:active { transform: scale(0.95); }
.fab-refresh.spinning svg { animation: spin 0.8s linear infinite; }
.fab-refresh svg { width: 22px; height: 22px; stroke: white; fill: none; stroke-width: 2.2; transition: opacity 0.2s; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── PROFILE MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(6,13,26,0.85); backdrop-filter: blur(8px);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-sheet {
  width: 100%; max-width: 480px;
  background: var(--surface); border-radius: 24px 24px 0 0;
  border: 1px solid var(--border); border-bottom: none;
  padding: 12px 20px 40px;
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--dim); margin: 0 auto 20px; }
.modal-title { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; margin-bottom:4px; }
.modal-sub { font-size:12px; color:var(--muted); margin-bottom:24px; }
.modal-field { margin-bottom:16px; }
.modal-field label { display:block; font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
.modal-field input {
  width:100%; padding:12px 14px; border-radius:12px;
  background:var(--card); border:1px solid var(--border);
  color:var(--snow); font-size:15px; font-family:'Inter',sans-serif;
  outline:none; transition:border-color 0.2s;
}
.modal-field input:focus { border-color:var(--blue); }
.modal-field input::placeholder { color:var(--muted); }
.modal-actions { display:flex; gap:10px; margin-top:20px; }
.modal-btn {
  flex:1; padding:14px; border-radius:14px; border:none;
  font-family:'Syne',sans-serif; font-size:16px; font-weight:700;
  cursor:pointer; letter-spacing:0.05em; transition:opacity 0.2s, transform 0.15s;
}
.modal-btn:active { transform:scale(0.97); }
.modal-btn-save { background:var(--blue); color:white; }
.modal-btn-cancel { background:var(--card); color:var(--muted); border:1px solid var(--border); }
.modal-status { margin-top:12px; font-size:12px; text-align:center; min-height:18px; }
.modal-status.ok  { color:var(--green); }
.modal-status.err { color:var(--red); }

/* chip becomes a button */
.instructor-chip { cursor:pointer; transition: border-color 0.2s; }
.instructor-chip:hover { border-color:rgba(59,139,255,0.4); }

/* ── EMPTY STATES ── */
.empty-state {
  text-align:center; padding:56px 28px 40px;
  display:flex; flex-direction:column; align-items:center; gap:0;
}
.empty-emoji { font-size:56px; line-height:1; margin-bottom:18px;
  filter: drop-shadow(0 4px 16px rgba(59,139,255,0.2)); }
.empty-title { font-family:'Syne',sans-serif; font-size:22px; font-weight:800;
  margin-bottom:10px; color:var(--snow); }
.empty-sub { font-size:13px; color:var(--muted); line-height:1.7; max-width:260px; }
.empty-cta { margin-top:24px; padding:12px 24px; border-radius:30px;
  background:var(--blue); color:white; border:none; cursor:pointer;
  font-family:'Syne',sans-serif; font-size:14px; font-weight:700;
  letter-spacing:0.04em; transition:opacity 0.2s, transform 0.15s;
  box-shadow:0 4px 16px rgba(59,139,255,0.35); }
.empty-cta:hover { opacity:0.88; } .empty-cta:active { transform:scale(0.96); }

/* skeleton placeholder cards */
.skel-card { background:var(--card); border:1px solid var(--border);
  border-radius:16px; padding:14px 16px; margin-bottom:8px; overflow:hidden; position:relative; }
.skel-card::after { content:''; position:absolute; inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.03) 50%,transparent 100%);
  animation:shimmer 1.8s infinite; }
@keyframes shimmer { from{transform:translateX(-100%)} to{transform:translateX(100%)} }
.skel-line { border-radius:6px; background:rgba(255,255,255,0.06); }
.skel-title { height:14px; width:60%; margin-bottom:10px; }
.skel-sub   { height:10px; width:35%; }
.skel-hrs   { position:absolute; right:16px; top:14px; width:32px; height:26px; border-radius:6px; }

/* stat placeholder tiles */
.bstat-empty { opacity:0.3; }
.bstat-empty .bstat-val { font-size:28px; letter-spacing:0.1em; }
</style>
<script>

</script>

<body>

<div class="page active" id="page-schedule">
  <div class="sched-header">
    <div class="sched-header-top">
      <div>
        <div class="greeting">Whistler Blackcomb · 2025/26</div>
        <div class="sched-title">My Schedule</div>
      </div>
      <div class="instructor-chip" onclick="openProfile()">
        <div class="chip-avatar" id="chipAvatar">S</div>
        <div class="chip-name" id="chipName">Sam Sheng</div>
      </div>
    </div>
  </div>
  <div class="month-nav">
    <div class="month-label" id="monthLabel">—</div>
    <div class="nav-arrows">
      <button class="nav-btn" onclick="shiftWeek(-1)">‹</button>
      <button class="nav-btn" onclick="shiftWeek(1)">›</button>
    </div>
  </div>
  <div class="week-strip" id="weekStrip"></div>
  <div class="day-detail">
    <div class="day-detail-header" id="dayDetailHeader">Today</div>
    <div id="dayCards"></div>
  </div>
</div>

<div class="page" id="page-stats">
  <div class="stats-page">
    <div class="stats-title fade-in">Season Stats</div>
    <div class="stats-sub fade-in d1" id="statsSubtitle"></div>
    <div class="big-stats fade-in d2" id="bigStats"></div>
    <div class="section-title fade-in d3">Season Heatmap</div>
    <div class="heatmap-wrap fade-in d4"><div class="heatmap-months" id="heatmap"></div></div>
    <div id="heatmapLegend" class="fade-in d4"></div>
    <div class="section-title fade-in d4">Hours by Program</div>
    <div class="breakdown fade-in d5" id="breakdown"></div>
    <div class="section-title fade-in d5">Private Clients</div>
    <div class="client-list" id="clientList"></div>
  </div>
</div>

<nav class="tabs">
  <div class="tab active" onclick="switchTab('schedule')" id="tab-schedule">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Schedule
  </div>
  <div class="tab" onclick="switchTab('stats')" id="tab-stats">
    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Stats
  </div>
</nav>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONSTANTS & HELPERS
// ─────────────────────────────────────────────────────────────────────────────
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS_SHORT   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const TODAY_KEY    = new Date().toISOString().slice(0, 10);

function toKey(d) { return d.toISOString().slice(0,10); }

function cleanTitle(raw) {
  return raw
    .replace(/^WB:\s*/i,'')
    .replace(/^Sched\s+(?:for\s+)?/i,'')
    .trim();
}

function getLocation(raw) {
  if (/\(B2\)/i.test(raw))       return 'B2';
  if (/\(B\)/i.test(raw))        return 'Blackcomb';
  if (/\(W\)/i.test(raw))        return 'Whistler';
  if (/Blackcomb/i.test(raw))    return 'Blackcomb';
  if (/Whistler/i.test(raw))     return 'Whistler';
  return null;
}

function getPrivateDuration(raw) {
  if (/\bFD\b/.test(raw)) return 'Full Day';
  if (/\bHD\b/.test(raw)) return 'Half Day';
  return null;
}

// ─────────────────────────────────────────────────────────────────────────────
// CLASSIFICATION ENGINE
// ─────────────────────────────────────────────────────────────────────────────

function isPaid(assignment) {
  return assignment === 'Assignment' ||
         assignment === 'Continuing Assignment' ||
         assignment === 'Private Request';
}

// "Sched for …" placeholder row (future schedule intent)
function isSched(raw) { return /^\s*(?:WB:\s*)?Sched\b/i.test(raw); }

function classifyRow(raw, assignment) {
  const al  = raw.toLowerCase();
  const paid = isPaid(assignment);

  if (isSched(raw)) {
    let program = detectProgram(al);
    if (/training/i.test(al)) program = 'training';
    if (/private.*(meeting|standby|start of day|end of day)/i.test(al)) program = 'private_admin';
    else if (/private/i.test(al)) program = 'private';
    return { category:'SCHED', paid:false, program, discipline:getDiscipline(al) };
  }
  if (/thank you for the great season/i.test(raw))      return { category:'SEASON_END',  paid:false };
  if (/regular day off/i.test(raw))                     return { category:'DAY_OFF',     paid:false };
  if (/time off/i.test(raw))                            return { category:'TIME_OFF',    paid:false };
  if (/called off/i.test(raw))                          return { category:'CALLED_OFF',  paid:false };
  if (/called in sick/i.test(raw))                      return { category:'SICK',        paid:false };
  if (/keen to work|morning off|afternoon off|\bam hold\b/i.test(raw))
                                                        return { category:'AVAIL_META',  paid:false };
  if (/term process/i.test(al))                         return { category:'ADMIN',       paid, program:'admin' };
  if (/training/i.test(al))
    return { category:'TRAINING', paid, program:'training', discipline:getDiscipline(al) };
  if (/fd private meeting|pm private meeting|am private meeting|private meeting|private end of day|private standby|private start of day/i.test(al))
    return { category:'PRIVATE_ADMIN', paid, program:'private_admin' };
  if (/private|manual/i.test(al))
    return { category:'PRIVATE_LESSON', paid, program:'private', discipline:getDiscipline(al) };

  const prog = detectProgram(al);
  return { category:'LESSON', paid, program:prog, discipline:getDiscipline(al) };
}

function detectProgram(al) {
  if (/never ever/i.test(al))                          return 'never_ever';
  if (/womens?\s*camp/i.test(al))                     return 'womens_camps';
  if (/schools|race league/i.test(al))                 return 'schools';
  if (/adaptive/i.test(al))                            return 'adaptive';
  if (/wvsbc|wvsc\b/i.test(al))                       return 'wvsbc';
  if (/\bwcb\b/i.test(al))                           return 'wcb';
  if (/\bclub\b|roundhouse/i.test(al))               return 'club';
  if (/adult\s+alpine/i.test(al))                     return 'adult_alpine';
  if (/alpine/i.test(al))                              return 'club';
  if (/daily.*(sb|ski|snowboard|5-12)|riders?\s+daily/i.test(al)) return 'daily_kids';
  if (/teen/i.test(al))                                return 'teens_daily';
  if (/adult|base\s+sk|base\s+sb/i.test(al))         return 'adult_base';
  return 'other';
}

function getDiscipline(al) {
  if (/wvsbc|wvsc\b/i.test(al))                       return 'snowboard';
  if (/\bsb\b|snowboard|board|rider/i.test(al))      return 'snowboard';
  if (/\bski\b|skiing|roundhouse|alpine/i.test(al))  return 'ski';
  return null;
}

function getProgram(raw, assignment = 'Assignment') {
  const { category, program } = classifyRow(raw, assignment);
  if (category === 'SEASON_END')     return 'end';
  if (category === 'DAY_OFF' || category === 'TIME_OFF' ||
      category === 'CALLED_OFF')     return 'off';
  if (category === 'SICK')           return 'sick';
  if (category === 'AVAIL_META')     return 'off';
  if (category === 'TRAINING')       return 'training';
  if (category === 'PRIVATE_ADMIN')  return 'private_admin';
  if (category === 'PRIVATE_LESSON') return 'private';
  if (category === 'ADMIN')          return 'other';
  const MAP = {
    schools:'schools', wvsbc:'wvsbc', wcb:'club', club:'club',
    adaptive:'adaptive', never_ever:'never_ever', womens_camps:'womens_camps',
    daily_kids:'daily', teens_daily:'teens', adult_alpine:'adult_alpine',
    adult_base:'adult_base', other:'other',
    private:'private', private_admin:'private_admin', training:'training',
  };
  return MAP[program] || 'other';
}

// SCHEDULE DATA
// ─────────────────────────────────────────────────────────────────────────────
let SEASON_END_KEY = null;
const byDate = {};

// ─────────────────────────────────────────────────────────────────────────────
// BUILD DAY VIEW
// ─────────────────────────────────────────────────────────────────────────────

function buildDayView(key) {
  const raw = byDate[key] || [];
  const isPast   = key < TODAY_KEY;
  const isFuture = key > TODAY_KEY;
  const isAfterEnd = SEASON_END_KEY && key > SEASON_END_KEY;

  if (!raw.length) return [];
  if (isAfterEnd) return [];

  const cards = [];

  if (isFuture) {
    // ── FUTURE DAYS ──────────────────────────────────────────────────────────
    // Show any row that represents real work:
    //   (a) rows with a paid assignment (Assignment / Continuing / Private Request)
    //   (b) "Sched for …" placeholder rows that aren't off/end
    // Exclude pure meta rows (Day Off, Time Off, Called Off, Sick, Season End,
    // Keen-to-work, Private overhead admin rows)
    const NON_WORK_PROGS = new Set(['off','end','sick','private_admin']);
    const seenTitles = new Set();

    raw.forEach(l => {
      const prog = getProgram(l.raw);
      if (NON_WORK_PROGS.has(prog)) return;

      const isSchedRow = isSched(l.raw);
      const isAssigned = isPaid(l.assignment);

      // Only include if it's a sched-for placeholder OR has a real assignment
      if (!isSchedRow && !isAssigned) return;

      // Deduplicate by clean title to avoid e.g. multiple sched rows for same program
      const title = cleanTitle(l.raw);
      if (seenTitles.has(title)) return;
      seenTitles.add(title);

      cards.push({
        title,
        program: prog,
        discipline: getDiscipline(l.raw),
        location: getLocation(l.raw),
        isSched: isSchedRow && !isAssigned,
        hours: null,   // don't show hours for future (may be 0 placeholders)
        assignment: isAssigned ? l.assignment : null,
        client: l.client || null,
        duration: getPrivateDuration(l.raw),
      });
    });

    // Fall back: show Day Off if truly nothing work-related
    if (!cards.length) {
      const hasOff = raw.some(l => /regular day off/i.test(l.raw));
      if (hasOff) cards.push({ title: 'Day Off', program: 'off', isSched: false, hours: null });
    }

  } else {
    // ── PAST / TODAY ─────────────────────────────────────────────────────────
    const privateGroups = {};
    raw.forEach(l => {
      if (!isPaid(l.assignment)) return;
      const prog = getProgram(l.raw);
      if (['off','end'].includes(prog)) return;
      if (prog === 'private_admin') return;

      if (prog === 'private') {
        const groupKey = l.client || 'private_' + key;
        if (!privateGroups[groupKey]) privateGroups[groupKey] = { hours: 0, client: l.client, raws: [], assignment: l.assignment };
        privateGroups[groupKey].hours += l.hours;
        privateGroups[groupKey].raws.push(l.raw);
      } else {
        cards.push({
          title: cleanTitle(l.raw),
          program: prog,
          discipline: getDiscipline(l.raw),
          location: getLocation(l.raw),
          isSched: false,
          hours: l.hours,
          assignment: l.assignment,
          client: l.client || null,
          duration: getPrivateDuration(l.raw),
        });
      }
    });

    Object.values(privateGroups).forEach(g => {
      const mainRaw = g.raws.find(r => !/meeting|end of day|standby|sched/i.test(r)) || g.raws[0];
      cards.push({
        title: cleanTitle(mainRaw),
        program: 'private',
        discipline: getDiscipline(mainRaw),
        location: getLocation(mainRaw),
        isSched: false,
        hours: parseFloat(g.hours.toFixed(2)),
        assignment: g.assignment,
        client: g.client || null,
        duration: getPrivateDuration(mainRaw),
      });
    });

    if (!cards.length) {
      const sickRow = raw.find(l => /sick/i.test(l.raw));
      const offRow  = raw.find(l => /regular day off|called off|time off/i.test(l.raw));
      if (sickRow) cards.push({ title: 'Called in Sick', program: 'sick', isSched: false, hours: null });
      else if (offRow) cards.push({ title: 'Day Off', program: 'off', isSched: false, hours: null });
    }
  }

  return cards;
}

    let pills = '';
    if (c.isSched) {
      pills += `<span class="pill pill-sched">Scheduled</span>`;
    } else if (c.assignment === 'Continuing Assignment') {
      pills += `<span class="pill pill-continuing">↻ Continuing</span>`;
    } else if (c.assignment === 'Assignment') {
      pills += `<span class="pill pill-assigned">✓ Assigned</span>`;

    if (c.program === 'sick')          pills += `<span class="pill pill-sick">Sick Day</span>`;
    if (c.program === 'off' && !c.isSched) pills += `<span class="pill pill-off">Day Off</span>`;

    const hoursHtml = (c.hours && c.hours > 0 && !c.isSched)
      ? `<div class="lcard-hours" style="color:${cfg.textColor}">${c.hours}<small>hrs</small></div>` : '';

    html += `<div class="${cls}">

  });

  document.getElementById('dayCards').innerHTML = html;
}

// ─────────────────────────────────────────────────────────────────────────────
// WEEK STRIP & NAVIGATION
// ─────────────────────────────────────────────────────────────────────────────
let weekOffset = 0;
let selectedKey = TODAY_KEY;

function getWeekStart() {
  const base = new Date(TODAY_KEY + 'T12:00:00');
  const s = new Date(base);
  s.setDate(base.getDate() - base.getDay() + weekOffset * 7);
  return s;
}

function renderWeek() {
  const ws = getWeekStart();
  document.getElementById('monthLabel').textContent = MONTHS_SHORT[ws.getMonth()] + ' ' + ws.getFullYear();

  let html = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws); d.setDate(ws.getDate() + i);
    const key = toKey(d);
    const lessons = byDate[key] || [];
    const isFuture = key > TODAY_KEY;
    const isPast   = key < TODAY_KEY;
    const isAfterEnd = SEASON_END_KEY && key > SEASON_END_KEY;

    let hasWork = false;
    if (!isAfterEnd) {
      if (isFuture) {
        // Has work dot if there are any assigned or sched-for non-off rows
        const NON_WORK_PROGS = new Set(['off','end','sick','private_admin']);
        hasWork = lessons.some(l => {
          const prog = getProgram(l.raw);
          if (NON_WORK_PROGS.has(prog)) return false;
          return isPaid(l.assignment) || isSched(l.raw);
        });
      } else {
        hasWork = lessons.some(l => isPaid(l.assignment) && !['off','end','private_admin'].includes(getProgram(l.raw)));
      }
    }

    const cls = ['wd',
      key === selectedKey ? 'selected' : '',
      key === TODAY_KEY && key !== selectedKey ? 'today-ring' : '',
      hasWork ? 'has-work' : 'is-off',
      isPast && key !== selectedKey ? 'past-day' : '',
    ].filter(Boolean).join(' ');

    html += `<div class="${cls}" onclick="selectDay('${key}')">
      <span class="wd-label">${DAYS_SHORT[d.getDay()]}</span>
      <span class="wd-num">${d.getDate()}</span>
      <span class="wd-dot"></span>
    </div>`;
  }
  document.getElementById('weekStrip').innerHTML = html;
  renderDayCards(selectedKey);
}

function selectDay(key) { selectedKey = key; renderWeek(); }
function shiftWeek(dir) {
  weekOffset += dir;
  const d = new Date(selectedKey + 'T12:00:00');
  d.setDate(d.getDate() + dir * 7);
  selectedKey = toKey(d);
  renderWeek();
}

function buildStats() {
  if (!Object.keys(byDate).length) {
    document.getElementById('statsSubtitle').textContent = 'Nov 2025 — Apr 2026';
    document.getElementById('bigStats').innerHTML = `
      <div class="bstat bstat-empty"><div class="bstat-val c-blue">––</div><div class="bstat-label">Work Days</div></div>
      <div class="bstat bstat-empty"><div class="bstat-val c-orange">––</div><div class="bstat-label">Paid Hours</div></div>
      <div class="bstat bstat-empty"><div class="bstat-val c-yellow">––</div><div class="bstat-label">Private Days</div></div>
      <div class="bstat bstat-empty"><div class="bstat-val c-purple">––</div><div class="bstat-label">Clients</div></div>`;
    document.getElementById('breakdown').innerHTML = `
      <div class="empty-state" style="padding:32px 20px">
        <div class="empty-emoji">📊</div>
        <div class="empty-title">No data yet</div>
        <div class="empty-sub">Refresh your schedule to see a full breakdown of hours by program.</div>
        <button class="empty-cta" onclick="triggerRefresh()">Refresh now</button>
      </div>`;
    document.getElementById('heatmap').innerHTML = '';
    document.getElementById('heatmapLegend').innerHTML = '';
    document.getElementById('clientList').innerHTML = `
      <div class="empty-state" style="padding:32px 20px">
        <div class="empty-emoji">👥</div>
        <div class="empty-title">No clients yet</div>
        <div class="empty-sub">Your private lesson clients will appear here after loading your schedule.</div>
      </div>`;
    return;
  }

  const validKeys = Object.keys(byDate).filter(k => !SEASON_END_KEY || k < SEASON_END_KEY);

  const workDayKeys = validKeys.filter(k =>
    byDate[k].some(l => isPaid(l.assignment) && !['off','end','sick','other'].includes(getProgram(l.raw)) && getProgram(l.raw) !== 'private_admin')
  );

  const progHours = {};
  let adminOverheadHrs = 0;
  validKeys.forEach(k => {
    byDate[k].forEach(l => {
      if (!isPaid(l.assignment)) return;
      const prog = getProgram(l.raw);
      if (['off','end'].includes(prog)) return;
      if (prog === 'private_admin') { adminOverheadHrs += l.hours; return; }
      if (prog === 'other' && /term process/i.test(l.raw)) return;
      progHours[prog] = (progHours[prog]||0) + l.hours;
    });
  });
  const lessonHrs = Object.values(progHours).reduce((a,b)=>a+b,0);

  const privateDayKeys = new Set(
    validKeys.filter(k => byDate[k].some(l => isPaid(l.assignment) && getProgram(l.raw)==='private'))
  );

  const clients = {};
  validKeys.forEach(k => {
    byDate[k].forEach(l => {
      if (!l.client || !isPaid(l.assignment)) return;
      if (!clients[l.client]) clients[l.client] = { name:l.client, days:new Set(), raws:[] };
      clients[l.client].days.add(k);
      clients[l.client].raws.push(l.raw);
    });
  });

  const allKeys = Object.keys(byDate).sort();
  const seasonStart = allKeys[0];
  const seasonEndDisplay = SEASON_END_KEY || allKeys[allKeys.length-1];
  const s = new Date(seasonStart+'T12:00:00'), e = new Date(seasonEndDisplay+'T12:00:00');
  document.getElementById('statsSubtitle').textContent =
    `${MONTHS_SHORT[s.getMonth()]} ${s.getDate()}, ${s.getFullYear()} — ${MONTHS_SHORT[e.getMonth()]} ${e.getDate()}, ${e.getFullYear()}`;

  document.getElementById('bigStats').innerHTML = `
    <div class="bstat"><div class="bstat-val c-blue">${workDayKeys.length}</div><div class="bstat-label">Work Days</div></div>
    <div class="bstat"><div class="bstat-val c-orange">${Math.round(lessonHrs)}</div><div class="bstat-label">Lesson Hours</div></div>
    <div class="bstat"><div class="bstat-val c-yellow">${privateDayKeys.size}</div><div class="bstat-label">Private Days</div></div>
    <div class="bstat"><div class="bstat-val c-purple">${Object.keys(clients).length}</div><div class="bstat-label">Clients</div></div>
  `;

  // Breakdown bars — sorted by hours descending
  const programs = [
    { key:'schools',      label:'Schools',          color:'var(--blue)'   },
    { key:'wvsbc',        label:'WVSBC',             color:'#6eb5ff'       },
    { key:'wcb',          label:'WCB',               color:'var(--purple)' },
    { key:'club',         label:'Club / Roundhouse', color:'var(--purple)' },
    { key:'adaptive',     label:'Adaptive',          color:'#a78bfa'       },
    { key:'never_ever',   label:'Never Ever',        color:'#60d4f0'       },
    { key:'womens_camps', label:"Women's Camps",     color:'#ff8cc8'       },
    { key:'daily',        label:'Kids Daily',        color:'var(--teal)'   },
    { key:'teens',        label:'Teens Daily',       color:'var(--teal)'   },
    { key:'adult_alpine', label:'Adult Alpine',      color:'#7dd3a8'       },
    { key:'adult_base',   label:'Adult Base',        color:'#f09a54'       },
    { key:'private',      label:'Private Lessons',   color:'var(--yellow)' },
    { key:'training',     label:'Training',          color:'var(--green)'  },
    { key:'other',        label:'Other',             color:'var(--muted)'  },
  ];
  if (adminOverheadHrs > 0) {
    programs.push({ key:'_admin_overhead', label:'Priv Overhead', color:'#ff9f43' });
    progHours['_admin_overhead'] = adminOverheadHrs;
  }

  // Filter to non-zero, then sort descending by hours
  const activePrograms = programs
    .filter(p => (progHours[p.key] || 0) > 0)
    .sort((a, b) => (progHours[b.key] || 0) - (progHours[a.key] || 0));

  const maxH = activePrograms.length ? (progHours[activePrograms[0].key] || 1) : 1;
  let bHtml = '';
  activePrograms.forEach(p => {
    const h = progHours[p.key];
    const pct = Math.round((h / maxH) * 100);
    bHtml += `<div class="brow">
      <div class="brow-top">
        <span class="brow-label"><span class="brow-dot" style="background:${p.color}"></span>${p.label}</span>
        <span class="brow-vals">${h.toFixed(1)}h</span>
      </div>
      <div class="brow-bar"><div class="brow-fill" style="width:${pct}%;background:${p.color}"></div></div>
    </div>`;
  });
  document.getElementById('breakdown').innerHTML = bHtml || '<p style="color:var(--muted);padding:16px;font-size:13px">No lesson hours recorded yet.</p>';

  // Heatmap
  const hmMonths = [{y:2025,m:10},{y:2025,m:11},{y:2026,m:0},{y:2026,m:1},{y:2026,m:2},{y:2026,m:3}];
  let hmHtml = '';
  hmMonths.forEach(({y,m}) => {
    const first = new Date(y,m,1);
    const days  = new Date(y,m+1,0).getDate();
    let cells = '';
    for (let p=0;p<first.getDay();p++) cells += `<div class="hm-cell hm-empty"></div>`;
    for (let d=1;d<=days;d++) {
      const key = toKey(new Date(y,m,d));
      const ls  = byDate[key]||[];
      const isSeasonEndDay = key === SEASON_END_KEY;
      const afterEnd = SEASON_END_KEY && key > SEASON_END_KEY;
      let cls = 'hm-cell ';
      if (afterEnd)       { cls += 'hm-empty'; }
      else if (isSeasonEndDay) { cls += 'hm-end'; }
      else if (!ls.length) { cls += 'hm-off'; }
      else {
        const progs = ls.map(l=>getProgram(l.raw));
        const paid  = ls.filter(l=>isPaid(l.assignment));
        const hasSick = progs.includes('sick');
        const isTimeOff = ls.some(l => /time off/i.test(l.raw));
        const hasFutureSched = !isTimeOff && key > TODAY_KEY && ls.some(l=>{
          const prog = getProgram(l.raw);
          return !['off','end','sick','private_admin'].includes(prog) && (isPaid(l.assignment) || isSched(l.raw));
        });
        if (isTimeOff) cls += 'hm-off';
        else if (hasSick) cls += 'hm-sick';
        else if (hasFutureSched) cls += 'hm-sched';
        else if (progs.includes('private') && paid.filter(l=>getProgram(l.raw)==='private').length) cls += 'hm-private';
        else if (progs.includes('training') && paid.length) cls += 'hm-training';
        else if (progs.every(p=>p==='off')) cls += 'hm-off';
        else {
          const h = paid.reduce((s,l)=>s+l.hours,0);
          if (h>=7) cls+='hm-full'; else if (h>=4) cls+='hm-med'; else if (h>0) cls+='hm-light'; else cls+='hm-off';
        }
      }
      cells += `<div class="${cls}" title="${key}"></div>`;
    }
    hmHtml += `<div><div class="hm-month-label">${MONTHS_SHORT[m]} ${y===2025?'25':'26'}</div><div class="hm-grid">${cells}</div></div>`;
  });

  const legendItems = [
    { cls:'hm-full',    label:'Work day' },
    { cls:'hm-sched',   label:'Scheduled' },
    { cls:'hm-private', label:'Private' },
    { cls:'hm-training',label:'Training' },
    { cls:'hm-sick',    label:'Sick day' },
    { cls:'hm-end',     label:'Season end' },
    { cls:'hm-off',     label:'Day off' },
  ];
  const legendHtml = '<div class="hm-legend">' + legendItems.map(it =>
    `<div class="hm-leg-item"><div class="hm-leg-swatch hm-cell ${it.cls}" style="width:12px;height:12px;border-radius:2px"></div>${it.label}</div>`
  ).join('') + '</div>';

  document.getElementById('heatmap').innerHTML = hmHtml;
  document.getElementById('heatmapLegend').innerHTML = legendHtml;

  // Clients list
  const clientArr = Object.values(clients).sort((a,b)=>b.days.size-a.days.size);
  let cHtml = '';
  clientArr.forEach(c => {
    const initials = c.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const mainRaw = c.raws.find(r=>!/meeting|end of day/i.test(r))||c.raws[0];
    const disc = getDiscipline(mainRaw);
    const loc  = getLocation(mainRaw);
    const dur  = getPrivateDuration(mainRaw);
    const meta = [disc==='ski'?'Ski':disc==='snowboard'?'Snowboard':null, loc, dur].filter(Boolean).join(' · ');
    cHtml += `<div class="client-row">
      <div class="client-avatar">${initials}</div>
      <div>
        <div class="client-name">${c.name}</div>
        <div class="client-meta">${meta||'Private Lesson'}</div>
      </div>
      <div class="client-days">${c.days.size}d</div>
    </div>`;
  });
  document.getElementById('clientList').innerHTML = cHtml || `
    <div class="empty-state" style="padding:32px 20px">
      <div class="empty-emoji">🎿</div>
      <div class="empty-title">No private clients</div>
      <div class="empty-sub">Private lesson bookings with named clients will show up here.</div>
    </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
}

// ─────────────────────────────────────────────────────────────────────────────
// CREDENTIALS + PROFILE MODAL
// ─────────────────────────────────────────────────────────────────────────────
function loadCredentials() {
  return {
    passNumber: localStorage.getItem('wb_passNumber') || '',
    password:   localStorage.getItem('wb_password')   || '',
  };
}

function openProfile() {
  const creds = loadCredentials();
  document.getElementById('inputPassNumber').value = creds.passNumber;
  document.getElementById('inputPassword').value   = creds.password;
  document.getElementById('modalStatus').textContent = '';
  document.getElementById('profileModal').classList.add('open');
}

function closeProfile() {
  document.getElementById('profileModal').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('profileModal')) closeProfile();
}

function saveCredentials() {
  const pn = document.getElementById('inputPassNumber').value.trim();
  const pw = document.getElementById('inputPassword').value.trim();
  if (!pn || !pw) {
    setModalStatus('Please fill in both fields.', 'err');
    return;
  }
  localStorage.setItem('wb_passNumber', pn);
  localStorage.setItem('wb_password',   pw);
  setModalStatus('✓ Saved!', 'ok');
  setTimeout(closeProfile, 800);
}

function setModalStatus(msg, type) {
  const el = document.getElementById('modalStatus');
  el.textContent = msg;
  el.className = 'modal-status ' + (type || '');
}

// ─────────────────────────────────────────────────────────────────────────────
// REFRESH
// ─────────────────────────────────────────────────────────────────────────────
async function triggerRefresh() {
  const creds = loadCredentials();
  if (!creds.passNumber || !creds.password) {
    openProfile();
    setModalStatus('Enter your credentials first, then hit Refresh.', 'err');
    return;
  }

  const fab = document.getElementById('fabRefresh');
  fab.classList.add('spinning');
  fab.disabled = true;

  try {
    const resp = await fetch('/api/scrape', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ passNumber: creds.passNumber, password: creds.password }),
    });

    const data = await resp.json();

    if (!resp.ok) {
      if (resp.status === 401) {
        openProfile();
        setModalStatus('❌ ' + (data.error || 'Invalid credentials.'), 'err');
      } else {
        alert('Refresh failed: ' + (data.error || 'Unknown error'));
      }
      return;
    }

    ingestLessons(data.lessons);
    saveScheduleCache(data.lessons);
    renderWeek();
    buildStats();

    if (data.instructorName) {
      localStorage.setItem('wb_instructorName', data.instructorName);
      updateChipName(data.instructorName);
    }

    fab.style.background = 'var(--green)';
    setTimeout(() => { fab.style.background = ''; }, 1200);

  } catch (err) {
    alert('Network error — are you connected? ' + err.message);
  } finally {
    fab.classList.remove('spinning');
    fab.disabled = false;
  }
}

function ingestLessons(lessons) {
  Object.keys(byDate).forEach(k => delete byDate[k]);
  SEASON_END_KEY = null;

  lessons.forEach(l => {
    const d = new Date(l.date.replace(/^[A-Za-z]+,\s*/, ''));
    if (isNaN(d)) return;
    const key = toKey(d);
    if (!byDate[key]) byDate[key] = [];
    byDate[key].push({
      date: d, key,
      hours: parseFloat(l.hours) || 0,
      raw: (l.activity || '').trim(),
      assignment: (l.assignment || '').trim(),
      client: (l.client || '').trim(),
    });
  });

  Object.keys(byDate).sort().forEach(key => {
    if (!SEASON_END_KEY && byDate[key].some(l => getProgram(l.raw) === 'end')) {
      SEASON_END_KEY = key;
    }
  });
}

function updateChipName(name) {
  // Format: "Chengmin ( Sam ) Sheng" → prefer nickname e.g. "Sam Sheng"
  let display = name.trim();
  const nick = display.match(/\(\s*([^)]+?)\s*\)/);
  if (nick) {
    // Extract last word of the full name as the surname
    const parts = display.replace(/\(.*?\)/, '').trim().split(/\s+/);
    const last = parts[parts.length - 1] || '';
    display = nick[1].trim() + (last ? ' ' + last : '');
  }
  // Update chip avatar initial
  const initial = display.charAt(0).toUpperCase();
  document.getElementById('chipAvatar').textContent = initial;
  document.getElementById('chipName').textContent = display;
}

function saveScheduleCache(lessons) {
  try { localStorage.setItem('wb_schedule_cache', JSON.stringify(lessons)); } catch(e) {}
}

function loadScheduleCache() {
  try {
    const raw = localStorage.getItem('wb_schedule_cache');
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

window.addEventListener('load', () => {
  const creds     = loadCredentials();
  const savedName = localStorage.getItem('wb_instructorName');
  const cache     = loadScheduleCache();

  if (savedName) updateChipName(savedName);
  else if (creds.passNumber) document.getElementById('chipName').textContent = creds.passNumber;

  if (cache && cache.length) {
    ingestLessons(cache);
    renderWeek();
    buildStats();
  } else {
    renderWeek();
    buildStats();
    if (!creds.passNumber) setTimeout(openProfile, 600);
  }
});
</script>

<!-- ── FLOATING REFRESH ── -->
<button class="fab-refresh" id="fabRefresh" onclick="triggerRefresh()" title="Refresh schedule">
  <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
</button>

<!-- ── PROFILE MODAL ── -->
<div class="modal-overlay" id="profileModal" onclick="handleOverlayClick(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Profile & Credentials</div>
    <div class="modal-sub">Saved locally on your device — never sent anywhere except the portal.</div>
    <div class="modal-field">
      <label>Pass Number</label>
      <input type="text" id="inputPassNumber" placeholder="e.g. 110104517880" inputmode="numeric" />
    </div>
    <div class="modal-field">
      <label>Password</label>
      <input type="password" id="inputPassword" placeholder="Your portal password" />
    </div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" onclick="closeProfile()">Cancel</button>
      <button class="modal-btn modal-btn-save" onclick="saveCredentials()">Save</button>
    </div>
    <div class="modal-status" id="modalStatus"></div>
  </div>
</div>

</body>
