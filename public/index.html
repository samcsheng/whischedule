<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#060d1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WhisSchedule">
<meta name="application-name" content="WhisSchedule">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>WhisSchedule — Whistler Blackcomb</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Inter+Tight:wght@600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg:      #060d1a;
  --surface: #0c1829;
  --card:    #111f35;
  --border:  rgba(255,255,255,0.07);
  --snow:    #e8f0ff;
  --muted:   #4a6080;
  --dim:     #1e3050;
  --blue:    #3b8bff;
  --orange:  #ff7c42;
  --green:   #2dcc8a;
  --purple:  #9b7dff;
  --yellow:  #ffc542;
  --red:     #ff4d6d;
  --teal:    #2dccc4;
  --f-ui:    'Inter', sans-serif;
  --f-head:  'Inter Tight', sans-serif;
  --f-mono:  'DM Mono', monospace;
}
html, body { height: 100%; background: var(--bg); color: var(--snow); font-family: var(--f-ui); overflow-x: hidden; }
body::after { content:''; position:fixed; inset:0; pointer-events:none; z-index:9999; opacity:0.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:150px; }

/* ── TABS ── */
.tabs { display:flex; position:fixed; bottom:0; left:0; right:0; z-index:100;
  background:rgba(6,13,26,0.95); backdrop-filter:blur(20px);
  border-top:1px solid var(--border); padding-bottom:env(safe-area-inset-bottom,10px); }
.tab { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:12px 4px 8px;
  cursor:pointer; color:var(--muted); font-size:10px; font-weight:500; letter-spacing:0.05em;
  text-transform:uppercase; transition:color 0.2s; }
.tab svg { width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:1.8; }
.tab.active { color:var(--blue); }
.page { display:none; min-height:100vh; padding-bottom:90px; }
.page.active { display:block; }

/* ── SCHEDULE PAGE LAYOUT ── */
#page-schedule.active {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 90px);
  min-height: 0;
  overflow: hidden;
  padding-bottom: 0;
}
#page-schedule .top-bar,
#page-schedule .picker-area { flex-shrink: 0; }
#page-schedule .day-scroll {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* ── TOP BAR ── */
.top-bar {
  display: flex;
  align-items: center;
  padding: calc(env(safe-area-inset-top, 0px) + 10px) 16px 10px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  gap: 10px;
  min-height: 52px;
}
.top-bar-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--f-head); font-size: 13px; font-weight: 700;
  color: white; flex-shrink: 0; cursor: pointer;
  transition: opacity 0.15s;
}
.top-bar-avatar:active { opacity: 0.7; }
.top-bar-title {
  flex: 1;
  text-align: center;
  font-family: var(--f-head);
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--snow);
}
.top-bar-search {
  width: 32px; height: 32px; border-radius: 8px;
  background: transparent; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted); flex-shrink: 0;
  transition: color 0.15s;
}
.top-bar-search:active { color: var(--snow); }
.top-bar-search svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; }

/* ── PICKER AREA ── */
.picker-area {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: relative;
  user-select: none;
  padding-bottom: 16px; /* space between grid and handle */
}

/* Month row */
.picker-month-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px 6px;
}
.picker-month-label {
  font-family: var(--f-head);
  font-size: 15px;
  font-weight: 700;
  color: var(--snow);
}
.picker-nav-row {
  display: flex;
  align-items: center;
  gap: 2px;
}
.picker-today-btn {
  font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
  padding: 4px 10px; border-radius: 20px;
  background: rgba(59,139,255,0.12); border: 1px solid rgba(59,139,255,0.2);
  color: var(--blue); cursor: pointer; transition: background 0.15s;
}
.picker-today-btn:hover { background: rgba(59,139,255,0.2); }

/* DOW header */
.picker-dow-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 0 12px;
}
.picker-dow-cell {
  text-align: center;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 4px 0;
}

/* Week row (collapsed) — horizontally scrollable, snaps to Sunday-aligned pages */
.picker-week-row {
  display: flex;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
  padding: 4px 8px 2px;
  gap: 2px;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
}
.picker-week-row::-webkit-scrollbar { display: none; }
/* Each week of 7 cells is a snap unit */
.picker-week-snap {
  display: flex;
  flex-shrink: 0;
  gap: 2px;
  scroll-snap-align: start;
}

/* Month grid (expanded) — vertically scrollable, snaps per month block */
.picker-month-grid {
  display: none;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  max-height: 0;
  transition: max-height 0.38s cubic-bezier(0.16,1,0.3,1);
  scrollbar-width: none;
  padding: 4px 8px 2px;
  scroll-snap-type: y mandatory;
  -webkit-overflow-scrolling: touch;
}
.picker-month-grid::-webkit-scrollbar { display: none; }
/* Each month block is a snap unit */
.picker-month-block {
  scroll-snap-align: start;
  flex-shrink: 0;
}
.picker-month-week-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  margin-bottom: 4px;
}
.picker-area.expanded .picker-week-row { display: none; }
.picker-area.expanded .picker-month-grid { display: flex; max-height: 320px; }

/* Month label inside expanded grid — sits above first day cell row */
.picker-grid-month-label {
  font-family: var(--f-head);
  font-size: 11px;
  font-weight: 700;
  color: var(--blue);
  letter-spacing: 0.07em;
  text-transform: uppercase;
  padding: 12px 4px 4px;
}

/* Day cell shared — square */
.picker-day {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px;
  aspect-ratio: 1;
  min-width: 36px;
  min-height: 36px;
  flex-shrink: 0;
  border-radius: 50%;
  cursor: pointer; transition: background 0.12s;
}
.picker-week-row .picker-day {
  width: calc((100vw - 16px) / 7);
  height: calc((100vw - 16px) / 7);
  max-width: 54px;
  max-height: 54px;
}
.picker-month-week-row .picker-day {
  width: 100%;
  height: auto;
}
.picker-day:active { background: rgba(255,255,255,0.06); }
.picker-day-num {
  font-family: var(--f-head);
  font-size: 17px; font-weight: 600; line-height: 1;
  color: var(--snow);
}
.picker-day-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: transparent;
}
.picker-day.has-work .picker-day-dot { background: var(--blue); }
.picker-day.is-off { opacity: 0.28; }
.picker-day.past   { opacity: 0.55; }
.picker-day.past.has-work { opacity: 0.55; }
.picker-day.today .picker-day-num { color: var(--blue); }
.picker-day.selected { background: var(--blue); }
.picker-day.selected .picker-day-num { color: white; }
.picker-day.selected .picker-day-dot { background: rgba(255,255,255,0.55); }
.picker-day.selected.today .picker-day-num { color: white; }
.picker-day.faded { opacity: 0.18; }

/* ── PULL HANDLE BUBBLE — inside picker, bottom-centred ── */
.picker-handle {
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 8px auto 0;
  width: 48px; height: 22px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 30px;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  transition: background 0.15s, transform 0.15s;
}
.picker-handle:hover { background: var(--dim); }
.picker-handle:active { transform: scale(0.94); }
.picker-handle svg {
  width: 14px; height: 14px;
  stroke: var(--muted); fill: none; stroke-width: 2.2;
  transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
}
.picker-area.expanded .picker-handle svg { transform: rotate(180deg); }

/* ── DAY SCROLL ── */
.day-scroll {
  padding-top: 0;
}

/* ── DAY LIST ── */
.day-list { display: flex; flex-direction: column; }

/* Day section */
.day-section { scroll-margin-top: 0; }

/* Sticky day header — compact, distinct background */
.day-header {
  position: sticky;
  top: 0;
  z-index: 5;
  display: flex;
  align-items: center;
  padding: 6px 16px;
  background: rgba(12,24,41,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.day-header-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}
.day-header-label.is-today { color: var(--blue); }

/* Lesson row — compact with distinct background */
.lesson-row {
  display: flex;
  align-items: stretch;
  gap: 0;
  min-height: 52px;
  border-bottom: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  transition: background 0.1s;
}
.lesson-row:last-child { border-bottom: none; }
.lesson-row:active { background: rgba(255,255,255,0.04); }

.lesson-bar-gutter {
  width: 16px;
  flex-shrink: 0;
  display: flex;
  align-items: stretch;
  justify-content: center;
  padding: 10px 0;
}
.lesson-bar {
  width: 3px;
  border-radius: 2px;
  flex-shrink: 0;
  align-self: stretch;
}
/* bar colours per program */
.lesson-row.prog-schools    .lesson-bar { background: var(--blue); }
.lesson-row.prog-daily      .lesson-bar { background: var(--teal); }
.lesson-row.prog-teens      .lesson-bar { background: var(--teal); }
.lesson-row.prog-club       .lesson-bar { background: var(--purple); }
.lesson-row.prog-wvsbc      .lesson-bar { background: #6eb5ff; }
.lesson-row.prog-wcb        .lesson-bar { background: var(--purple); }
.lesson-row.prog-adaptive   .lesson-bar { background: #a78bfa; }
.lesson-row.prog-never_ever .lesson-bar { background: #60d4f0; }
.lesson-row.prog-womens_camps .lesson-bar { background: #ff8cc8; }
.lesson-row.prog-adult_alpine .lesson-bar { background: #7dd3a8; }
.lesson-row.prog-adult_base   .lesson-bar { background: #f09a54; }
.lesson-row.prog-private    .lesson-bar { background: var(--yellow); }
.lesson-row.prog-training   .lesson-bar { background: var(--green); }
.lesson-row.prog-sick       .lesson-bar { background: var(--red); }
.lesson-row.prog-off        .lesson-bar { background: var(--dim); }
.lesson-row.prog-other      .lesson-bar { background: var(--muted); }

.lesson-row.is-off { opacity: 0.3; }

.lesson-body {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px 10px 6px;
}
.lesson-main { flex: 1; min-width: 0; }
.lesson-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--snow);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
  margin-bottom: 3px;
}
.lesson-pills {
  display: flex;
  gap: 4px;
  flex-wrap: nowrap;
  overflow: hidden;
}
.pill {
  font-size: 10px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 20px;
  letter-spacing: 0.01em;
  white-space: nowrap;
  flex-shrink: 0;
}
.pill-assigned   { background: rgba(59,139,255,0.12);  color: #7ab8ff;        }
.pill-continuing { background: rgba(155,125,255,0.12); color: var(--purple);  }
.pill-requested  { background: rgba(255,197,66,0.12);  color: var(--yellow);  }
.pill-sched      { background: rgba(74,96,128,0.15);   color: var(--muted);   }
.pill-ski        { background: rgba(59,139,255,0.08);  color: #7ab8ff;        }
.pill-sb         { background: rgba(255,124,66,0.1);   color: #ffaa7a;        }
.pill-loc        { background: rgba(255,255,255,0.05); color: var(--muted);   }
.pill-client     { background: rgba(255,197,66,0.1);   color: var(--yellow);  }
.pill-fd         { background: rgba(255,197,66,0.1);   color: var(--yellow);  }
.pill-hd         { background: rgba(255,197,66,0.06);  color: #c9a030;        }
.pill-sick       { background: rgba(255,77,109,0.12);  color: var(--red);     }
.pill-off        { background: rgba(255,255,255,0.04); color: var(--muted);   }

.lesson-hours {
  font-family: var(--f-mono);
  font-size: 13px;
  font-weight: 500;
  flex-shrink: 0;
  text-align: right;
  line-height: 1;
  color: var(--muted);
}
.lesson-hours small {
  display: block;
  font-size: 9px;
  font-weight: 400;
  margin-top: 2px;
  opacity: 0.6;
}
/* hour colour per program */
.lesson-row.prog-schools    .lesson-hours { color: #7ab8ff; }
.lesson-row.prog-daily      .lesson-hours,
.lesson-row.prog-teens      .lesson-hours { color: var(--teal); }
.lesson-row.prog-club       .lesson-hours { color: var(--purple); }
.lesson-row.prog-private    .lesson-hours { color: var(--yellow); }
.lesson-row.prog-training   .lesson-hours { color: var(--green); }
.lesson-row.prog-adult_alpine .lesson-hours { color: #7dd3a8; }
.lesson-row.prog-adult_base   .lesson-hours { color: #f09a54; }
.lesson-row.prog-never_ever   .lesson-hours { color: #60d4f0; }
.lesson-row.prog-womens_camps .lesson-hours { color: #ff8cc8; }
.lesson-row.prog-adaptive     .lesson-hours { color: #a78bfa; }
.lesson-row.prog-wvsbc        .lesson-hours { color: #6eb5ff; }

/* Empty day row */
.day-empty {
  padding: 10px 16px 10px 19px;
  font-size: 12px;
  color: var(--muted);
  opacity: 0.5;
  border-bottom: 1px solid var(--border);
}

/* ── STATS PAGE ── */
.stats-page { padding:52px 20px 24px; }
.stats-title { font-family:var(--f-head); font-size:28px; font-weight:800; margin-bottom:4px; }
.stats-sub { font-size:12px; color:var(--muted); margin-bottom:24px; }
.section-title { font-family:var(--f-head); font-size:15px; font-weight:700; margin:20px 0 10px; }

.big-stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:4px; }
.bstat { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px 16px; }
.bstat-val { font-family:var(--f-head); font-size:36px; font-weight:800; line-height:1; }
.bstat-val.c-blue   { color:var(--blue); }
.bstat-val.c-orange { color:var(--orange); }
.bstat-val.c-green  { color:var(--green); }
.bstat-val.c-yellow { color:var(--yellow); }
.bstat-val.c-purple { color:var(--purple); }
.bstat-val.c-teal   { color:var(--teal); }
.bstat-label { font-size:10px; color:var(--muted); margin-top:5px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; }

.breakdown { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:16px; }
.brow { margin-bottom:14px; }
.brow:last-child { margin-bottom:0; }
.brow-top { display:flex; justify-content:space-between; margin-bottom:6px; align-items:center; }
.brow-label { font-size:12px; font-weight:500; display:flex; align-items:center; gap:6px; }
.brow-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.brow-vals { font-family:var(--f-mono); font-size:11px; color:var(--muted); }
.brow-bar { height:4px; background:rgba(255,255,255,0.06); border-radius:2px; overflow:hidden; }
.brow-fill { height:100%; border-radius:2px; transition:width 1.2s cubic-bezier(0.16,1,0.3,1); }

.heatmap-wrap { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:16px; overflow-x:auto; }
.heatmap-months { display:flex; gap:14px; min-width:max-content; }
.hm-month-label { font-size:10px; color:var(--muted); font-weight:600; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:6px; }
.hm-grid { display:grid; grid-template-columns:repeat(7,16px); gap:3px; }
.hm-cell { width:16px; height:16px; border-radius:3px; }
.hm-empty    { background:transparent; }
.hm-off      { background:rgba(255,255,255,0.05); }
.hm-light    { background:rgba(59,139,255,0.3); }
.hm-med      { background:rgba(59,139,255,0.6); }
.hm-full     { background:var(--blue); }
.hm-private  { background:var(--yellow); opacity:0.85; }
.hm-training { background:var(--green); opacity:0.7; }
.hm-sick     { background:var(--red); opacity:0.8; }
.hm-sched    { background: repeating-linear-gradient(45deg, rgba(59,139,255,0.5) 0px, rgba(59,139,255,0.5) 3px, rgba(59,139,255,0.15) 3px, rgba(59,139,255,0.15) 6px); }
.hm-end      { background:rgba(255,77,109,0.5); border:1px solid rgba(255,77,109,0.7); }
.hm-legend { display:flex; flex-wrap:wrap; gap:10px; margin-top:10px; padding:12px 16px; background:var(--card); border:1px solid var(--border); border-radius:16px; }
.hm-leg-item { display:flex; align-items:center; gap:5px; font-size:10px; color:var(--muted); font-weight:500; }
.hm-leg-swatch { width:12px; height:12px; border-radius:2px; flex-shrink:0; }

.client-list { background:var(--card); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
.client-row { display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px solid var(--border); }
.client-row:last-child { border-bottom:none; }
.client-avatar { width:30px; height:30px; border-radius:50%; background:linear-gradient(135deg,rgba(255,197,66,0.3),rgba(255,124,66,0.3)); border:1px solid rgba(255,197,66,0.2); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--yellow); flex-shrink:0; }
.client-name { font-size:13px; font-weight:600; flex:1; }
.client-meta { font-size:10px; color:var(--muted); }
.client-days { font-family:var(--f-mono); font-size:13px; color:var(--yellow); }

.fade-in { animation:fi 0.4s ease both; }
@keyframes fi { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}.d5{animation-delay:.25s}

/* ── FLOATING REFRESH ── */
.fab-refresh {
  position: fixed; bottom: 90px; right: 20px; z-index: 200;
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--blue); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(59,139,255,0.4);
  transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
  color: white;
}
.fab-refresh:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(59,139,255,0.55); }
.fab-refresh:active { transform: scale(0.95); }
.fab-refresh.spinning svg { animation: spin 0.8s linear infinite; }
.fab-refresh svg { width: 22px; height: 22px; stroke: white; fill: none; stroke-width: 2.2; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── STATUS BUBBLE ── */
.status-bubble {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
  z-index: 999; background: var(--card); border: 1px solid var(--border);
  border-radius: 30px; padding: 10px 18px;
  display: flex; align-items: center; gap: 10px;

.empty-cta:hover { opacity:0.88; } .empty-cta:active { transform:scale(0.96); }

.skel-row { height: 46px; border-bottom: 1px solid var(--border); overflow: hidden; position: relative; }
.skel-row::after { content:''; position:absolute; inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.03) 50%,transparent 100%);
  animation:shimmer 1.8s infinite; }
@keyframes shimmer { from{transform:translateX(-100%)} to{transform:translateX(100%)} }

.bstat-empty { opacity:0.3; }
.bstat-empty .bstat-val { font-size:28px; letter-spacing:0.1em; }

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONSTANTS & HELPERS
// ─────────────────────────────────────────────────────────────────────────────
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_LONG  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_SHORT   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAYS_LONG    = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const TODAY_KEY    = new Date().toISOString().slice(0, 10);

function toKey(d) { return d.toISOString().slice(0, 10); }

function cleanTitle(raw) {
  return raw.replace(/^WB:\s*/i,'').replace(/^Sched\s+(?:for\s+)?/i,'').trim();
}
function getLocation(raw) {
  if (/\(B2\)/i.test(raw))    return 'B2';
  if (/\(B\)/i.test(raw))     return 'Blackcomb';
  if (/\(W\)/i.test(raw))     return 'Whistler';
  if (/Blackcomb/i.test(raw)) return 'Blackcomb';
  if (/Whistler/i.test(raw))  return 'Whistler';
  return null;
}
function getPrivateDuration(raw) {
  if (/\bFD\b/.test(raw)) return 'Full Day';
  if (/\bHD\b/.test(raw)) return 'Half Day';
  return null;
}

// ─────────────────────────────────────────────────────────────────────────────
// V3 ENGINE
// ─────────────────────────────────────────────────────────────────────────────
function isPaid(a) {
  return a === 'Assignment' || a === 'Continuing Assignment' || a === 'Private Request';
}
function isSched(raw) { return /^\s*(?:WB:\s*)?Sched\b/i.test(raw); }

function classifyRow(raw, assignment) {
  const al = raw.toLowerCase();
  const paid = isPaid(assignment);
  if (isSched(raw)) {
    let program = detectProgram(al);
    if (/training/i.test(al)) program = 'training';
    if (/private.*(meeting|standby|start of day|end of day)/i.test(al)) program = 'private_admin';
    else if (/private/i.test(al)) program = 'private';
    return { category:'SCHED', paid:false, program, discipline:getDiscipline(al) };
  }
  if (/thank you for the great season/i.test(raw)) return { category:'SEASON_END', paid:false };
  if (/regular day off/i.test(raw))               return { category:'DAY_OFF',    paid:false };
  if (/time off/i.test(raw))                       return { category:'TIME_OFF',   paid:false };
  if (/called off/i.test(raw))                     return { category:'CALLED_OFF', paid:false };
  if (/called in sick/i.test(raw))                 return { category:'SICK',       paid:false };
  if (/keen to work|morning off|afternoon off|\bam hold\b/i.test(raw))
                                                   return { category:'AVAIL_META', paid:false };
  if (/term process/i.test(al))                    return { category:'ADMIN',      paid, program:'admin' };
  if (/training/i.test(al))
    return { category:'TRAINING', paid, program:'training', discipline:getDiscipline(al) };
  if (/fd private meeting|pm private meeting|am private meeting|private meeting|private end of day|private standby|private start of day/i.test(al))
    return { category:'PRIVATE_ADMIN', paid, program:'private_admin' };
  if (/private|manual/i.test(al))
    return { category:'PRIVATE_LESSON', paid, program:'private', discipline:getDiscipline(al) };
  const prog = detectProgram(al);
  return { category:'LESSON', paid, program:prog, discipline:getDiscipline(al) };
}

function detectProgram(al) {
  if (/never ever/i.test(al))                                     return 'never_ever';
  if (/womens?\s*camp/i.test(al))                                  return 'womens_camps';
  if (/schools|race league/i.test(al))                             return 'schools';
  if (/adaptive/i.test(al))                                        return 'adaptive';
  if (/wvsbc|wvsc\b/i.test(al))                                    return 'wvsbc';
  if (/\bwcb\b/i.test(al))                                         return 'wcb';
  if (/\bclub\b|roundhouse/i.test(al))                             return 'club';
  if (/adult\s+alpine/i.test(al))                                  return 'adult_alpine';
  if (/alpine/i.test(al))                                          return 'club';
  if (/daily.*(sb|ski|snowboard|5-12)|riders?\s+daily/i.test(al)) return 'daily_kids';
  if (/teen/i.test(al))                                            return 'teens_daily';
  if (/adult|base\s+sk|base\s+sb/i.test(al))                       return 'adult_base';
  return 'other';
}

function getDiscipline(al) {
  if (/wvsbc|wvsc\b/i.test(al))                      return 'snowboard';
  if (/\bsb\b|snowboard|board|rider/i.test(al))       return 'snowboard';
  if (/\bski\b|skiing|roundhouse|alpine/i.test(al))   return 'ski';
  return null;
}

function getProgram(raw, assignment = 'Assignment') {
  const { category, program } = classifyRow(raw, assignment);
  if (category === 'SEASON_END')    return 'end';
  if (category === 'DAY_OFF' || category === 'TIME_OFF' || category === 'CALLED_OFF') return 'off';
  if (category === 'SICK')          return 'sick';
  if (category === 'AVAIL_META')    return 'off';
  if (category === 'TRAINING')      return 'training';
  if (category === 'PRIVATE_ADMIN') return 'private_admin';
  if (category === 'PRIVATE_LESSON')return 'private';
  if (category === 'ADMIN')         return 'other';
  const MAP = {
    schools:'schools', wvsbc:'wvsbc', wcb:'club', club:'club',
    adaptive:'adaptive', never_ever:'never_ever', womens_camps:'womens_camps',
    daily_kids:'daily', teens_daily:'teens', adult_alpine:'adult_alpine',
    adult_base:'adult_base', other:'other',
    private:'private', private_admin:'private_admin', training:'training',
  };
  return MAP[program] || 'other';
}

// ─────────────────────────────────────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────────────────────────────────────
let SEASON_END_KEY = null;
const byDate = {};

// ─────────────────────────────────────────────────────────────────────────────
// BUILD DAY VIEW
// ─────────────────────────────────────────────────────────────────────────────
function buildDayView(key) {
  const raw = byDate[key] || [];
  const isFuture   = key > TODAY_KEY;
  const isAfterEnd = SEASON_END_KEY && key > SEASON_END_KEY;
  if (!raw.length) return [];
  if (isAfterEnd)  return [];

  const cards = [];
  const PROG_REMAP = { daily_kids:'daily', teens_daily:'teens', adult_alpine:'adult_alpine', adult_base:'adult_base', never_ever:'never_ever', womens_camps:'womens_camps' };

  if (isFuture) {
    const seenTitles = new Set();
    raw.forEach(l => {
      const isSchedRow = isSched(l.raw);
      const isAssigned = isPaid(l.assignment);
      if (!isSchedRow && !isAssigned) return;
      const { program: rawProg } = classifyRow(l.raw, l.assignment);
      if (!rawProg || ['off','end','sick','private_admin','admin'].includes(rawProg)) return;
      const prog = PROG_REMAP[rawProg] || rawProg;
      const title = cleanTitle(l.raw);
      if (seenTitles.has(title)) return;
      seenTitles.add(title);
      cards.push({ title, program:prog, discipline:getDiscipline(l.raw), location:getLocation(l.raw),
        isSched:isSchedRow && !isAssigned, hours:null,
        assignment:isAssigned ? l.assignment : null, client:l.client||null, duration:getPrivateDuration(l.raw) });
    });
    if (!cards.length && raw.some(l => /regular day off/i.test(l.raw)))
      cards.push({ title:'Day Off', program:'off', isSched:false, hours:null });

  } else {
    const isToday = key === TODAY_KEY;
    const privateGroups = {};
    const paidPrograms  = new Set();

    raw.forEach(l => {
      if (!isPaid(l.assignment)) return;
      const prog = getProgram(l.raw);
      if (['off','end'].includes(prog)) return;
      if (prog === 'private_admin') return;
      paidPrograms.add(prog);
      if (prog === 'private') {
        const gk = l.client || 'private_' + key;
        if (!privateGroups[gk]) privateGroups[gk] = { hours:0, client:l.client, raws:[], assignment:l.assignment };
        privateGroups[gk].hours += l.hours;
        privateGroups[gk].raws.push(l.raw);
      } else {
        cards.push({ title:cleanTitle(l.raw), program:prog, discipline:getDiscipline(l.raw),
          location:getLocation(l.raw), isSched:false, hours:l.hours,
          assignment:l.assignment, client:l.client||null, duration:getPrivateDuration(l.raw) });
      }
    });

    Object.values(privateGroups).forEach(g => {
      const mainRaw = g.raws.find(r => !/meeting|end of day|standby|sched/i.test(r)) || g.raws[0];
      cards.push({ title:cleanTitle(mainRaw), program:'private', discipline:getDiscipline(mainRaw),
        location:getLocation(mainRaw), isSched:false, hours:parseFloat(g.hours.toFixed(2)),
        assignment:g.assignment, client:g.client||null, duration:getPrivateDuration(mainRaw) });
    });

    if (isToday) {
      const seenSched = new Set();
      raw.forEach(l => {
        if (!isSched(l.raw)) return;
        const { program: schedProg } = classifyRow(l.raw, l.assignment);
        if (!schedProg || ['off','end','sick','private_admin','admin'].includes(schedProg)) return;
        if (paidPrograms.has(schedProg)) return;
        const title = cleanTitle(l.raw);
        if (seenSched.has(title)) return;
        seenSched.add(title);
        const displayProg = PROG_REMAP[schedProg] || schedProg;
        cards.push({ title, program:displayProg, discipline:getDiscipline(l.raw),
          location:getLocation(l.raw), isSched:true, hours:null, assignment:null,
          client:null, duration:getPrivateDuration(l.raw) });
      });
    }

    if (!cards.length) {
      const sickRow = raw.find(l => /sick/i.test(l.raw));
      const offRow  = raw.find(l => /regular day off|called off|time off/i.test(l.raw));
      if (sickRow)     cards.push({ title:'Called in Sick', program:'sick', isSched:false, hours:null });
      else if (offRow) cards.push({ title:'Day Off',        program:'off',  isSched:false, hours:null });
    }
  }
  return cards;
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER — COMPACT LESSON ROWS
// ─────────────────────────────────────────────────────────────────────────────
function buildRowsHtml(cards) {
  return cards.map(c => {
    const progCls = `prog-${c.program}`;
    const offCls  = (c.program === 'off' || c.program === 'sick') ? ' is-off' : '';

    let pills = '';
    if      (c.isSched)                              pills += `<span class="pill pill-sched">Scheduled</span>`;
    else if (c.assignment === 'Continuing Assignment') pills += `<span class="pill pill-continuing">↻ Cont.</span>`;
    else if (c.assignment === 'Assignment')            pills += `<span class="pill pill-assigned">✓ Assigned</span>`;
    else if (c.assignment === 'Private Request')       pills += `<span class="pill pill-requested">★ Requested</span>`;

    if (c.discipline === 'ski')       pills += `<span class="pill pill-ski">Ski</span>`;
    if (c.discipline === 'snowboard') pills += `<span class="pill pill-sb">Board</span>`;
    if (c.location)                   pills += `<span class="pill pill-loc">${c.location}</span>`;
    if (c.duration === 'Full Day')    pills += `<span class="pill pill-fd">FD</span>`;
    if (c.duration === 'Half Day')    pills += `<span class="pill pill-hd">HD</span>`;
    if (c.client)                     pills += `<span class="pill pill-client">${c.client}</span>`;

    const hoursHtml = (c.hours && c.hours > 0 && !c.isSched)
      ? `<div class="lesson-hours">${c.hours}<small>hrs</small></div>` : '';

    return `<div class="lesson-row ${progCls}${offCls}">
      <div class="lesson-bar-gutter"><div class="lesson-bar"></div></div>
      <div class="lesson-body">
        <div class="lesson-main">
          <div class="lesson-title">${c.title}</div>
          ${pills ? `<div class="lesson-pills">${pills}</div>` : ''}
        </div>
        ${hoursHtml}
      </div>
    </div>`;
  }).join('');
}

// ─────────────────────────────────────────────────────────────────────────────
// DAY KEYS & RENDER
// ─────────────────────────────────────────────────────────────────────────────
let dayKeys = [];
let hasFocusedInitialDay = false;

function computeDayKeys() {
  const keys = Object.keys(byDate).sort();
  if (!keys.length) return [];
  const minKey = keys[0];
  const maxKey = (SEASON_END_KEY && SEASON_END_KEY >= minKey) ? SEASON_END_KEY : keys[keys.length-1];
  const out = [];
  for (let d = new Date(minKey+'T12:00:00'), end = new Date(maxKey+'T12:00:00'); d <= end; d.setDate(d.getDate()+1))
    out.push(toKey(d));
  return out;
}

function formatDayHeader(key) {
  const d = new Date(key + 'T12:00:00');
  // "Saturday, March 7" — no year
  return DAYS_LONG[d.getDay()] + ', ' + MONTHS_LONG[d.getMonth()] + ' ' + d.getDate();
}

function renderDaySection(key) {
  const isToday  = key === TODAY_KEY;
  const isFuture = key > TODAY_KEY;
  const cards    = buildDayView(key);
  const label    = formatDayHeader(key);
  const labelCls = isToday ? 'day-header-label is-today' : 'day-header-label';

  const bodyHtml = cards.length
    ? buildRowsHtml(cards)
    : `<div class="day-empty">—</div>`;

  return `<section class="day-section" data-key="${key}">
    <div class="day-header">
      <div class="${labelCls}">${label}${isToday ? ' · Today' : ''}</div>
    </div>
    ${bodyHtml}
  </section>`;
}

function renderDayList() {
  const el = document.getElementById('dayList');
  if (!el) return;
  if (!Object.keys(byDate).length) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-emoji">🏔️</div>
        <div class="empty-title">Your season awaits</div>
        <div class="empty-sub">Enter your portal credentials and tap refresh to load your schedule.</div>
        <button class="empty-cta" onclick="openProfile()">Set up credentials</button>
      </div>
      <div class="skel-row"></div>
      <div class="skel-row" style="opacity:0.55"></div>
      <div class="skel-row" style="opacity:0.3"></div>`;
    dayKeys = [];
    return;
  }
  dayKeys = computeDayKeys();
  el.innerHTML = dayKeys.map(k => renderDaySection(k)).join('');
  setupScrollSync();
}

// ─────────────────────────────────────────────────────────────────────────────
// PICKER — COLLAPSED / EXPANDED
// ─────────────────────────────────────────────────────────────────────────────
let pickerExpanded = false;
let weekOffset     = 0;
let selectedKey    = TODAY_KEY;

function togglePicker() {
  pickerExpanded = !pickerExpanded;
  document.getElementById('pickerArea').classList.toggle('expanded', pickerExpanded);
  if (pickerExpanded) renderPickerMonth();
}

function getWeekStart(offset) {
  const base = new Date(TODAY_KEY + 'T12:00:00');
  const sun  = new Date(base);
  sun.setDate(base.getDate() - base.getDay() + (offset ?? weekOffset) * 7);
  return sun;
}

function renderPickerDow() {
  document.getElementById('pickerDowRow').innerHTML =
    DAYS_SHORT.map(d => `<div class="picker-dow-cell">${d}</div>`).join('');

  // Month label updates as user swipes week row
  const weekRow = document.getElementById('pickerWeekRow');
  if (weekRow) {
    weekRow.addEventListener('scroll', () => {
      // Find the leftmost visible day cell
      const cells = weekRow.querySelectorAll('.picker-day:not(.faded)');
      for (const cell of cells) {
        const rect = cell.getBoundingClientRect();
        const wRect = weekRow.getBoundingClientRect();
        if (rect.left >= wRect.left - 4) {
          const key = cell.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
          if (key) {
            const d = new Date(key + 'T12:00:00');
            document.getElementById('pickerMonthLabel').textContent =
              MONTHS_LONG[d.getMonth()] + ' ' + d.getFullYear();
          }
          break;
        }
      }
    }, { passive: true });
  }
}

function dayCell(key, num, extraCls) {
  const lessons    = byDate[key] || [];
  const isFuture   = key > TODAY_KEY;
  const isPast     = key < TODAY_KEY;
  const isAfterEnd = SEASON_END_KEY && key > SEASON_END_KEY;
  const NON_WORK   = new Set(['off','end','sick','private_admin']);

  let hasWork = false;
  if (!isAfterEnd) {
    if (isFuture || key === TODAY_KEY) {
      hasWork = lessons.some(l => {
        const { program:p } = classifyRow(l.raw, l.assignment);
        const mapped = ({daily_kids:'daily',teens_daily:'teens'}[p]||p);
        return !NON_WORK.has(mapped) && (isPaid(l.assignment) || isSched(l.raw));
      });
    } else {
      hasWork = lessons.some(l => isPaid(l.assignment) && !NON_WORK.has(getProgram(l.raw)));
    }
  }

  const cls = ['picker-day',
    key === selectedKey ? 'selected' : '',
    key === TODAY_KEY && key !== selectedKey ? 'today' : '',
    hasWork ? 'has-work' : (isAfterEnd ? 'faded' : 'is-off'),
    isPast && key !== selectedKey ? 'past' : '',
    extraCls || '',
  ].filter(Boolean).join(' ');

  return `<div class="${cls}" onclick="selectDay('${key}')">
    <span class="picker-day-num">${num}</span>
    <span class="picker-day-dot"></span>
  </div>`;
}

function renderPickerWeek() {
  // Build all season weeks grouped by Sunday, so scroll-snap always snaps to Sunday
  const allKeys = dayKeys.length ? dayKeys : computeFallbackKeys();
  if (!allKeys.length) { document.getElementById('pickerWeekRow').innerHTML = ''; return; }

  // Find the Sunday on or before the first key
  const firstDate  = new Date(allKeys[0] + 'T12:00:00');
  const startSun   = new Date(firstDate);
  startSun.setDate(firstDate.getDate() - firstDate.getDay());

  // Find the Saturday on or after the last key
  const lastDate   = new Date(allKeys[allKeys.length - 1] + 'T12:00:00');
  const endSat     = new Date(lastDate);
  endSat.setDate(lastDate.getDate() + (6 - lastDate.getDay()));

  let weekHtml = '';
  let cur = new Date(startSun);
  while (cur <= endSat) {
    let weekCells = '';
    for (let i = 0; i < 7; i++) {
      const d   = new Date(cur); d.setDate(cur.getDate() + i);
      const key = toKey(d);
      const inSeason = allKeys.includes(key) || (key >= allKeys[0] && key <= allKeys[allKeys.length-1]);
      if (inSeason) {
        weekCells += dayCell(key, d.getDate());
      } else {
        weekCells += `<div class="picker-day faded"><span class="picker-day-num">${d.getDate()}</span><span class="picker-day-dot"></span></div>`;
      }
    }
    weekHtml += `<div class="picker-week-snap">${weekCells}</div>`;
    cur.setDate(cur.getDate() + 7);
  }

  const weekRow = document.getElementById('pickerWeekRow');
  weekRow.innerHTML = weekHtml;

  // Update month label to show month of selected week
  const selD = new Date(selectedKey + 'T12:00:00');
  document.getElementById('pickerMonthLabel').textContent =
    MONTHS_LONG[selD.getMonth()] + ' ' + selD.getFullYear();

  // Scroll the snap container to show the selected day's week
  const selEl = weekRow.querySelector('.picker-day.selected');
  if (selEl) {
    const snapGroup = selEl.closest('.picker-week-snap');
    if (snapGroup) weekRow.scrollLeft = snapGroup.offsetLeft;
  }
}

function computeFallbackKeys() {
  // Fallback: season range Nov 2025–Apr 2026
  const out = [];
  for (let d = new Date(2025,10,1), end = new Date(2026,3,30); d <= end; d.setDate(d.getDate()+1))
    out.push(toKey(d));
  return out;
}

function renderPickerMonth() {
  // Full season months stacked, each as a scroll-snap block
  // Month label appears inline at the start of each month's first week row
  const seasonMonths = [
    {y:2025,m:10},{y:2025,m:11},
    {y:2026,m:0},{y:2026,m:1},{y:2026,m:2},{y:2026,m:3},
  ];
  let html = '';
  seasonMonths.forEach(({y, m}) => {
    const first = new Date(y, m, 1);
    const days  = new Date(y, m+1, 0).getDate();

    // Build all cells for this month: blanks + day cells
    let cells = [];
    for (let p = 0; p < first.getDay(); p++)
      cells.push(`<div class="picker-day faded"><span class="picker-day-num"></span><span class="picker-day-dot"></span></div>`);
    for (let d = 1; d <= days; d++) {
      const key = toKey(new Date(y, m, d));
      cells.push(dayCell(key, d));
    }

    // Split into rows of 7, wrap each in picker-month-week-row
    let rowsHtml = '';
    for (let i = 0; i < cells.length; i += 7) {
      const rowCells = cells.slice(i, i + 7);
      // Pad last row to 7
      while (rowCells.length < 7)
        rowCells.push(`<div class="picker-day faded"><span class="picker-day-num"></span><span class="picker-day-dot"></span></div>`);
      rowsHtml += `<div class="picker-month-week-row">${rowCells.join('')}</div>`;
    }

    html += `<div class="picker-month-block" data-month="${y}-${String(m+1).padStart(2,'0')}">
      <div class="picker-grid-month-label">${MONTHS_LONG[m]} ${y}</div>
      ${rowsHtml}
    </div>`;
  });

  const grid = document.getElementById('pickerMonthGrid');
  grid.innerHTML = html;

  // Snap scroll to the block containing selected day
  const selEl = grid.querySelector('.picker-day.selected');
  if (selEl) {
    const block = selEl.closest('.picker-month-block');
    if (block) setTimeout(() => { grid.scrollTop = block.offsetTop; }, 10);
  }

  // Update month label to selected month
  const selD = new Date(selectedKey + 'T12:00:00');
  document.getElementById('pickerMonthLabel').textContent =
    MONTHS_LONG[selD.getMonth()] + ' ' + selD.getFullYear();

  // Update label on scroll
  grid.onscroll = () => {
    const blocks = grid.querySelectorAll('.picker-month-block');
    for (const block of blocks) {
      const rect = block.getBoundingClientRect();
      const gridRect = grid.getBoundingClientRect();
      if (rect.top >= gridRect.top - 10) {
        const [yr, mo] = block.dataset.month.split('-').map(Number);
        document.getElementById('pickerMonthLabel').textContent =
          MONTHS_LONG[mo-1] + ' ' + yr;
        break;
      }
    }
  };
}

function renderPicker() {
  if (pickerExpanded) renderPickerMonth();
  else renderPickerWeek();
}

// ─────────────────────────────────────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────────────────────────────────────
function selectDay(key) {
  selectedKey = clampSelectedKey(key);
  weekOffset  = computeWeekOffsetForKey(selectedKey);
  if (pickerExpanded) {
    pickerExpanded = false;
    document.getElementById('pickerArea').classList.remove('expanded');
  }
  renderPickerWeek();
  scrollToDay(selectedKey, true);
}

function shiftWeek(dir) {
  // Only called in collapsed state now (no nav buttons in expanded)
  weekOffset += dir;
  const d = new Date(selectedKey + 'T12:00:00');
  d.setDate(d.getDate() + dir * 7);
  selectedKey = clampSelectedKey(toKey(d));
  renderPickerWeek();
  scrollToDay(selectedKey, true);
}

function goToToday() {
  const target = dayKeys && dayKeys.includes(TODAY_KEY) ? TODAY_KEY
    : (dayKeys.length ? (TODAY_KEY < dayKeys[0] ? dayKeys[0] : dayKeys[dayKeys.length-1]) : TODAY_KEY);
  selectedKey = target;
  weekOffset  = computeWeekOffsetForKey(selectedKey);
  if (pickerExpanded) { pickerExpanded = false; document.getElementById('pickerArea').classList.remove('expanded'); }
  renderPickerWeek();
  scrollToDay(selectedKey, true);
}

function clampSelectedKey(key) {
  const k = key ?? selectedKey;
  if (!dayKeys || !dayKeys.length) return k;
  if (dayKeys.includes(k)) return k;
  if (k < dayKeys[0]) return dayKeys[0];
  if (k > dayKeys[dayKeys.length-1]) return dayKeys[dayKeys.length-1];
  return dayKeys[0];
}

function computeWeekOffsetForKey(key) {
  const base = new Date(TODAY_KEY + 'T12:00:00');
  const bs   = new Date(base); bs.setDate(base.getDate() - base.getDay());
  const tgt  = new Date(key + 'T12:00:00');
  const ts   = new Date(tgt);  ts.setDate(tgt.getDate() - tgt.getDay());
  return Math.round((ts - bs) / (7 * 24 * 60 * 60 * 1000));
}

function scrollToDay(key, smooth) {
  const scroll = document.getElementById('dayScroll');
  const sec    = scroll && scroll.querySelector(`.day-section[data-key="${key}"]`);
  if (sec) sec.scrollIntoView({ behavior: smooth ? 'smooth' : 'auto', block: 'start' });
}

function focusInitialDay() {
  if (hasFocusedInitialDay) return;
  if (!dayKeys || !dayKeys.length) return;
  selectedKey = dayKeys.includes(TODAY_KEY) ? TODAY_KEY
    : (TODAY_KEY < dayKeys[0] ? dayKeys[0] : dayKeys[dayKeys.length-1]);
  selectedKey = clampSelectedKey(selectedKey);
  weekOffset  = computeWeekOffsetForKey(selectedKey);
  renderPicker();
  scrollToDay(selectedKey, false);
  hasFocusedInitialDay = true;
}

// ─────────────────────────────────────────────────────────────────────────────
// SCROLL SYNC — IntersectionObserver keeps picker in sync as user scrolls
// ─────────────────────────────────────────────────────────────────────────────
let scrollObserver = null;

function setupScrollSync() {
  if (scrollObserver) scrollObserver.disconnect();
  const scroll = document.getElementById('dayScroll');
  if (!scroll) return;

  scrollObserver = new IntersectionObserver((entries) => {
    // Find the topmost visible section
    const visible = entries
      .filter(e => e.isIntersecting)
      .sort((a,b) => a.boundingClientRect.top - b.boundingClientRect.top);
    if (!visible.length) return;
    const key = visible[0].target.dataset.key;
    if (!key || key === selectedKey) return;
    selectedKey = key;
    const newOffset = computeWeekOffsetForKey(selectedKey);
    if (!pickerExpanded && newOffset !== weekOffset) {
      weekOffset = newOffset;
    }
    renderPicker();
  }, {
    root: scroll,
    rootMargin: '0px 0px -80% 0px',
    threshold: 0,
  });

  scroll.querySelectorAll('.day-section').forEach(s => scrollObserver.observe(s));
}

// ─────────────────────────────────────────────────────────────────────────────
// STATS
// ─────────────────────────────────────────────────────────────────────────────
function buildStats() {
  if (!Object.keys(byDate).length) {
    document.getElementById('statsSubtitle').textContent = 'Nov 2025 — Apr 2026';
    document.getElementById('bigStats').innerHTML = `
      <div class="bstat bstat-empty"><div class="bstat-val c-blue">––</div><div class="bstat-label">Work Days</div></div>
      <div class="bstat bstat-empty"><div class="bstat-val c-orange">––</div><div class="bstat-label">Lesson Hours</div></div>
      <div class="bstat bstat-empty"><div class="bstat-val c-yellow">––</div><div class="bstat-label">Private Days</div></div>
      <div class="bstat bstat-empty"><div class="bstat-val c-purple">––</div><div class="bstat-label">Clients</div></div>`;
    document.getElementById('breakdown').innerHTML = `
      <div class="empty-state" style="padding:32px 20px">
        <div class="empty-emoji">📊</div><div class="empty-title">No data yet</div>
        <div class="empty-sub">Refresh your schedule to see hours by program.</div>
        <button class="empty-cta" onclick="triggerRefresh()">Refresh now</button>
      </div>`;
    document.getElementById('heatmap').innerHTML = '';
    document.getElementById('heatmapLegend').innerHTML = '';
    document.getElementById('clientList').innerHTML = `
      <div class="empty-state" style="padding:32px 20px">
        <div class="empty-emoji">👥</div><div class="empty-title">No clients yet</div>
        <div class="empty-sub">Private lesson clients appear here after loading your schedule.</div>
      </div>`;
    return;
  }

  const validKeys = Object.keys(byDate).filter(k => !SEASON_END_KEY || k < SEASON_END_KEY);
  const workDayKeys = validKeys.filter(k =>
    byDate[k].some(l => { if (!isPaid(l.assignment)) return false;
      const p = getProgram(l.raw); return !['off','end','sick','other','private_admin'].includes(p); }));
  const progHours = {};
  let adminOverheadHrs = 0;
  validKeys.forEach(k => { byDate[k].forEach(l => {
    if (!isPaid(l.assignment)) return;
    const prog = getProgram(l.raw);
    if (['off','end'].includes(prog)) return;
    if (prog === 'private_admin') { adminOverheadHrs += l.hours; return; }
    if (prog === 'other' && /term process/i.test(l.raw)) return;
    progHours[prog] = (progHours[prog] || 0) + l.hours;
  }); });
  const lessonHrs = Object.values(progHours).reduce((a,b)=>a+b,0);
  const privateDayKeys = new Set(validKeys.filter(k =>
    byDate[k].some(l => isPaid(l.assignment) && getProgram(l.raw) === 'private')));
  const clients = {};
  validKeys.forEach(k => { byDate[k].forEach(l => {
    if (!l.client || !isPaid(l.assignment)) return;
    if (!clients[l.client]) clients[l.client] = { name:l.client, days:new Set(), raws:[] };
    clients[l.client].days.add(k); clients[l.client].raws.push(l.raw);
  }); });

  const allKeys = Object.keys(byDate).sort();
  const s = new Date(allKeys[0]+'T12:00:00');
  const e = new Date((SEASON_END_KEY||allKeys[allKeys.length-1])+'T12:00:00');
  document.getElementById('statsSubtitle').textContent =
    `${MONTHS_SHORT[s.getMonth()]} ${s.getDate()}, ${s.getFullYear()} — ${MONTHS_SHORT[e.getMonth()]} ${e.getDate()}, ${e.getFullYear()}`;
  document.getElementById('bigStats').innerHTML = `
    <div class="bstat"><div class="bstat-val c-blue">${workDayKeys.length}</div><div class="bstat-label">Work Days</div></div>
    <div class="bstat"><div class="bstat-val c-orange">${Math.round(lessonHrs)}</div><div class="bstat-label">Lesson Hours</div></div>
    <div class="bstat"><div class="bstat-val c-yellow">${privateDayKeys.size}</div><div class="bstat-label">Private Days</div></div>
    <div class="bstat"><div class="bstat-val c-purple">${Object.keys(clients).length}</div><div class="bstat-label">Clients</div></div>`;

  const programs = [
    {key:'schools',label:'Schools',color:'var(--blue)'},{key:'wvsbc',label:'WVSBC',color:'#6eb5ff'},
    {key:'wcb',label:'WCB',color:'var(--purple)'},{key:'club',label:'Club / Roundhouse',color:'var(--purple)'},
    {key:'adaptive',label:'Adaptive',color:'#a78bfa'},{key:'never_ever',label:'Never Ever',color:'#60d4f0'},
    {key:'womens_camps',label:"Women's Camps",color:'#ff8cc8'},{key:'daily',label:'Kids Daily',color:'var(--teal)'},
    {key:'teens',label:'Teens Daily',color:'var(--teal)'},{key:'adult_alpine',label:'Adult Alpine',color:'#7dd3a8'},
    {key:'adult_base',label:'Adult Base',color:'#f09a54'},{key:'private',label:'Private Lessons',color:'var(--yellow)'},
    {key:'training',label:'Training',color:'var(--green)'},{key:'other',label:'Other',color:'var(--muted)'},
  ];
  if (adminOverheadHrs > 0) { programs.push({key:'_admin_overhead',label:'Priv Overhead',color:'#ff9f43'}); progHours['_admin_overhead'] = adminOverheadHrs; }
  const activePrograms = programs.filter(p=>(progHours[p.key]||0)>0).sort((a,b)=>(progHours[b.key]||0)-(progHours[a.key]||0));
  const maxH = activePrograms.length ? (progHours[activePrograms[0].key]||1) : 1;
  document.getElementById('breakdown').innerHTML = activePrograms.map(p => {
    const h = progHours[p.key]; const pct = Math.round((h/maxH)*100);
    return `<div class="brow"><div class="brow-top"><span class="brow-label"><span class="brow-dot" style="background:${p.color}"></span>${p.label}</span><span class="brow-vals">${h.toFixed(1)}h</span></div><div class="brow-bar"><div class="brow-fill" style="width:${pct}%;background:${p.color}"></div></div></div>`;
  }).join('') || '<p style="color:var(--muted);padding:16px;font-size:13px">No lesson hours recorded yet.</p>';

  const hmMonths = [{y:2025,m:10},{y:2025,m:11},{y:2026,m:0},{y:2026,m:1},{y:2026,m:2},{y:2026,m:3}];
  document.getElementById('heatmap').innerHTML = hmMonths.map(({y,m}) => {
    const first=new Date(y,m,1), days=new Date(y,m+1,0).getDate();
    let cells='';
    for(let p=0;p<first.getDay();p++) cells+=`<div class="hm-cell hm-empty"></div>`;
    for(let d=1;d<=days;d++){
      const key=toKey(new Date(y,m,d)); const ls=byDate[key]||[];
      const afterEnd=SEASON_END_KEY&&key>SEASON_END_KEY;
      let cls='hm-cell ';
      if(afterEnd){cls+='hm-empty';}
      else if(key===SEASON_END_KEY){cls+='hm-end';}
      else if(!ls.length){cls+='hm-off';}
      else{
        const progs=ls.map(l=>getProgram(l.raw)),paid=ls.filter(l=>isPaid(l.assignment));
        const NON_WORK_H=new Set(['off','end','sick','private_admin']);
        const hasFutureSched=key>TODAY_KEY&&ls.some(l=>!NON_WORK_H.has(getProgram(l.raw))&&(isPaid(l.assignment)||isSched(l.raw)));
        if(ls.some(l=>/time off/i.test(l.raw)))cls+='hm-off';
        else if(progs.includes('sick'))cls+='hm-sick';
        else if(hasFutureSched)cls+='hm-sched';
        else if(progs.includes('private')&&paid.filter(l=>getProgram(l.raw)==='private').length)cls+='hm-private';
        else if(progs.includes('training')&&paid.length)cls+='hm-training';
        else if(progs.every(p=>p==='off'))cls+='hm-off';
        else{const h=paid.reduce((s,l)=>s+l.hours,0);cls+=h>=7?'hm-full':h>=4?'hm-med':h>0?'hm-light':'hm-off';}
      }
      cells+=`<div class="${cls}" title="${key}"></div>`;
    }
    return `<div><div class="hm-month-label">${MONTHS_SHORT[m]} ${y===2025?'25':'26'}</div><div class="hm-grid">${cells}</div></div>`;
  }).join('');

  document.getElementById('heatmapLegend').innerHTML = '<div class="hm-legend">' +
    [{cls:'hm-full',label:'Work day'},{cls:'hm-sched',label:'Scheduled'},{cls:'hm-private',label:'Private'},
     {cls:'hm-training',label:'Training'},{cls:'hm-sick',label:'Sick day'},{cls:'hm-end',label:'Season end'},{cls:'hm-off',label:'Day off'}]
    .map(it=>`<div class="hm-leg-item"><div class="hm-leg-swatch hm-cell ${it.cls}" style="width:12px;height:12px;border-radius:2px"></div>${it.label}</div>`)
    .join('') + '</div>';

  const clientArr = Object.values(clients).sort((a,b)=>b.days.size-a.days.size);
  document.getElementById('clientList').innerHTML = clientArr.length ? clientArr.map(c => {
    const initials=c.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const mainRaw=c.raws.find(r=>!/meeting|end of day/i.test(r))||c.raws[0];
    const disc=getDiscipline(mainRaw),loc=getLocation(mainRaw),dur=getPrivateDuration(mainRaw);
    const meta=[disc==='ski'?'Ski':disc==='snowboard'?'Snowboard':null,loc,dur].filter(Boolean).join(' · ');
    return `<div class="client-row"><div class="client-avatar">${initials}</div><div><div class="client-name">${c.name}</div><div class="client-meta">${meta||'Private Lesson'}</div></div><div class="client-days">${c.days.size}d</div></div>`;
  }).join('') : `<div class="empty-state" style="padding:32px 20px"><div class="empty-emoji">🎿</div><div class="empty-title">No private clients</div><div class="empty-sub">Private lesson bookings with named clients will show up here.</div></div>`;
}

function loadCredentials() {
  return { passNumber: localStorage.getItem('wb_passNumber')||'', password: localStorage.getItem('wb_password')||'' };
}
function openProfile() {
  const c = loadCredentials();
  document.getElementById('inputPassNumber').value = c.passNumber;
  document.getElementById('inputPassword').value   = c.password;
  document.getElementById('modalStatus').textContent = '';
  document.getElementById('profileModal').classList.add('open');
}
function closeProfile() { document.getElementById('profileModal').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target === document.getElementById('profileModal')) closeProfile(); }
function saveCredentials() {
  const pn = document.getElementById('inputPassNumber').value.trim();
  const pw = document.getElementById('inputPassword').value.trim();
  if (!pn || !pw) { setModalStatus('Please fill in both fields.', 'err'); return; }
  localStorage.setItem('wb_passNumber', pn);
  localStorage.setItem('wb_password',   pw);
  setModalStatus('✓ Saved!', 'ok');
  setTimeout(closeProfile, 800);
}
function setModalStatus(msg, type) {
  const el = document.getElementById('modalStatus');
  el.textContent = msg; el.className = 'modal-status ' + (type||'');
}
function setChipLoggedOut() {
  document.getElementById('topAvatar').textContent = 'L';
}
function updateChipName(name) {
  let display = name.trim();
  if (!display) { setChipLoggedOut(); return; }
  const nick = display.match(/\(\s*([^)]+?)\s*\)/);
  if (nick) {
    const parts = display.replace(/\(.*?\)/,'').trim().split(/\s+/);
    const last  = parts[parts.length-1] || '';
    display = nick[1].trim() + (last ? ' '+last : '');
  }
  document.getElementById('topAvatar').textContent = display.charAt(0).toUpperCase();
}

// ─────────────────────────────────────────────────────────────────────────────
// DIFF
// ─────────────────────────────────────────────────────────────────────────────
function diffLessons(oldLessons, newLessons) {
  const toMap = arr => { const m={}; (arr||[]).forEach(l=>{m[l.date+'|'+l.activity]=l;}); return m; };
  const oldMap = toMap(oldLessons), newMap = toMap(newLessons);
  const addedM   = Object.keys(newMap).filter(k => !oldMap[k] && isPaid(newMap[k].assignment));
  const removedM = Object.keys(oldMap).filter(k => !newMap[k] && isPaid(oldMap[k].assignment));
  const changedM = Object.keys(newMap).filter(k => oldMap[k] && oldMap[k].assignment !== newMap[k].assignment
    && (isPaid(newMap[k].assignment) || isPaid(oldMap[k].assignment)));
  if (!addedM.length && !removedM.length && !changedM.length) return null;
  const parts = [];
  if (addedM.length)   parts.push(`+${addedM.length} new`);
  if (removedM.length) parts.push(`-${removedM.length} removed`);
  if (changedM.length) parts.push(`${changedM.length} updated`);
  return parts.join(', ');
}

// ─────────────────────────────────────────────────────────────────────────────
// CACHE
// ─────────────────────────────────────────────────────────────────────────────
function saveScheduleCache(lessons) {
  try { localStorage.setItem('wb_schedule_cache', JSON.stringify(lessons)); localStorage.setItem('wb_cache_ts', Date.now().toString()); } catch(e){}
}
function loadScheduleCache() {
  try { const r=localStorage.getItem('wb_schedule_cache'); return r?JSON.parse(r):null; } catch(e){return null;}
}
function cacheAgeHours() {
  const ts = parseInt(localStorage.getItem('wb_cache_ts')||'0',10);
  return ts ? (Date.now()-ts)/(1000*60*60) : Infinity;
}

// ─────────────────────────────────────────────────────────────────────────────
// REFRESH
// ─────────────────────────────────────────────────────────────────────────────
async function triggerRefresh(silent=false) {
  const creds = loadCredentials();
  if (!creds.passNumber || !creds.password) {
    if (!silent) { openProfile(); setModalStatus('Enter your credentials first, then hit Refresh.', 'err'); }
    return;
  }
  const fab = document.getElementById('fabRefresh');
  fab.classList.add('spinning'); fab.disabled = true;
  showBubble('Checking schedule…', 'loading', 0);
  const oldLessons = loadScheduleCache();
  try {
    const resp = await fetch('/api/scrape', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ passNumber:creds.passNumber, password:creds.password }),
    });
    const data = await resp.json();
    if (!resp.ok) {
      if (resp.status === 401) { openProfile(); setModalStatus('❌ '+(data.error||'Invalid credentials.'), 'err'); }
      showBubble('Refresh failed', 'error'); return;
    }
    const summary = diffLessons(oldLessons, data.lessons);
    ingestLessons(data.lessons);
    saveScheduleCache(data.lessons);
    renderDayList();
    if (!hasFocusedInitialDay) focusInitialDay();
    else renderPicker();
    buildStats();
    if (data.instructorName) { localStorage.setItem('wb_instructorName', data.instructorName); updateChipName(data.instructorName); }
    showBubble(summary ? 'Schedule updated — '+summary : 'No changes to schedule', summary ? 'success' : 'nochange');
  } catch(err) {
    showBubble('Network error — check connection', 'error');
  } finally {
    fab.classList.remove('spinning'); fab.disabled = false;
  }
}

function ingestLessons(lessons) {
  Object.keys(byDate).forEach(k => delete byDate[k]);
  SEASON_END_KEY = null;
  lessons.forEach(l => {
    const d = new Date(l.date.replace(/^[A-Za-z]+,\s*/,''));
    if (isNaN(d)) return;
    const key = toKey(d);
    if (!byDate[key]) byDate[key] = [];
    byDate[key].push({ date:d, key, hours:parseFloat(l.hours)||0,
      raw:(l.activity||'').trim(), assignment:(l.assignment||'').trim(), client:(l.client||'').trim() });
  });
  Object.keys(byDate).sort().forEach(key => {
    if (!SEASON_END_KEY && byDate[key].some(l => getProgram(l.raw)==='end')) SEASON_END_KEY = key;
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  renderPickerDow();
  const savedName = localStorage.getItem('wb_instructorName');
  const creds     = loadCredentials();
  const cache     = loadScheduleCache();

  if (savedName) updateChipName(savedName);
  else           setChipLoggedOut();

  if (cache && cache.length) {
    ingestLessons(cache);
    renderDayList();
    if (!hasFocusedInitialDay) focusInitialDay();
    else renderPicker();
    buildStats();
    if (cacheAgeHours() > 2) setTimeout(() => triggerRefresh(true), 1200);
  } else {
    renderPicker();
    renderDayList();
    buildStats();
    if (!creds.passNumber) setTimeout(openProfile, 600);
    else setTimeout(() => triggerRefresh(true), 1000);
  }
});
